<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Links Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Added SortableJS for Drag and Drop Reordering -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root {
            --bsa-blue: #003F87;
            --bsa-red: #CE1126;
            --bsa-gold: #FDC82F;
        }
        
        body { 
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            transition: background-color 0.5s ease;
        }

        .dark body { 
            background-color: #020617; 
            color: #f8fafc; 
        }

        .scout-card {
            background: white; 
            border-radius: 1.5rem; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0,63,135,0.05); 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .dark .scout-card { 
            background: #0f172a; 
            border-color: rgba(255,255,255,0.05); 
        }

        .scout-card:hover { 
            transform: translateY(-8px) scale(1.02); 
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.1);
            border-color: var(--bsa-blue);
        }

        .image-viewport { 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            position: relative; 
            overflow: hidden; 
            border-radius: 1rem; 
            background: #f1f5f9; 
            
            /* Crucial Mobile/Safari Bug Fixes to stop icons from bleeding out */
            -webkit-mask-image: -webkit-radial-gradient(white, black);
            mask-image: radial-gradient(white, black);
            transform: translateZ(0);
        }

        .dark .image-viewport { background: #1e293b; }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 5px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--bsa-blue);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
        }

        .modal-animate {
            animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Sortable JS Drag Styling */
        .sortable-ghost {
            opacity: 0.4;
            transform: scale(0.95);
        }
        .sortable-drag {
            cursor: grabbing !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
    </style>
</head>
<body class="min-h-screen relative">
    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-8 left-1/2 -translate-x-1/2 z-[1000] flex flex-col gap-3 pointer-events-none"></div>

    <div id="app">
        <!-- Header -->
        <header class="bg-white dark:bg-slate-900 border-b-[12px] border-yellow-400 shadow-2xl px-6 py-12 transition-colors">
            <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-10">
                <div class="relative group">
                    <div id="header-logo-container" class="w-44 h-44 rounded-[3rem] bg-slate-50 dark:bg-slate-800 shadow-inner overflow-hidden border-8 border-white dark:border-slate-700 transition-all relative">
                        <img id="main-logo" src="https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png" class="absolute inset-0 w-full h-full object-contain">
                    </div>
                    <button id="edit-header-btn" onclick="window.openHeaderModal()" class="hidden absolute -bottom-3 -right-3 p-3 bg-blue-600 text-white rounded-xl shadow-xl hover:scale-110 transition-transform z-20">
                        <!-- Icon injected by render() -->
                    </button>
                </div>

                <div class="text-center md:text-left flex-1 relative group pr-12">
                    <h1 id="display-title" class="text-6xl md:text-8xl font-black text-blue-900 dark:text-blue-500 uppercase tracking-tighter mb-2 leading-none">
                        Pack 26
                    </h1>
                    <div class="text-xl font-bold text-slate-400 dark:text-slate-500 uppercase tracking-[0.4em] flex items-center justify-center md:justify-start gap-3">
                        <i data-lucide="star" class="text-yellow-500 fill-yellow-500 w-5 h-5"></i>
                        <span id="display-subtitle">Scouting America</span>
                    </div>
                    <button id="edit-text-btn" onclick="window.openHeaderModal()" class="hidden absolute top-1/2 -translate-y-1/2 right-0 md:-right-4 p-3 bg-blue-600 text-white rounded-xl shadow-xl hover:scale-110 transition-transform">
                        <!-- Icon injected by render() -->
                    </button>
                </div>

                <div class="flex gap-4">
                    <button id="theme-btn" onclick="window.toggleDarkMode()" class="p-3 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-yellow-400 hover:text-blue-900 transition-all shadow-md flex items-center justify-center">
                        <!-- Icon injected by render() -->
                    </button>
                    <button id="admin-toggle-btn" onclick="window.toggleAdminMode()" class="hidden">
                        <!-- Content injected by render() -->
                    </button>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <main class="max-w-[90rem] mx-auto py-16 sm:py-20 px-4 sm:px-6 flex flex-col items-center" id="links-container">
            <!-- Categories and Links injected here -->
        </main>

        <!-- Auth & Footer -->
        <div class="fixed bottom-10 right-10 z-50">
            <button id="lock-btn" onclick="window.handleAuthClick()">
                <!-- Icon injected by render() -->
            </button>
        </div>
    </div>

    <!-- Universal Modal -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[100] hidden items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-900 rounded-[4rem] w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl modal-animate border-b-[16px] border-blue-900">
            <div class="bg-blue-900 p-8 text-white flex justify-between items-center">
                <h3 id="modal-title" class="text-2xl font-black uppercase tracking-widest">Settings</h3>
                <button onclick="window.closeModal()" class="p-3 hover:bg-white/10 rounded-full transition-colors"><i data-lucide="x"></i></button>
            </div>
            
            <div class="p-8 md:p-10 overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-12" id="modal-grid">
                <div class="space-y-6">
                    <div id="field-title">
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Title</label>
                        <input id="input-title" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold text-lg outline-none focus:ring-4 ring-blue-900/10 dark:text-white transition-all">
                    </div>
                    <div id="field-url">
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest" id="label-url">URL</label>
                        <input id="input-url" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl outline-none dark:text-white transition-all" placeholder="https://...">
                    </div>
                    <div id="field-category" class="hidden">
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Category</label>
                        <select id="input-category" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold outline-none focus:ring-4 ring-blue-900/10 dark:text-white transition-all appearance-none cursor-pointer">
                            <!-- Options injected dynamically -->
                        </select>
                    </div>
                    <div id="field-image">
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Image Source URL</label>
                        <input id="input-image" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl text-sm font-mono outline-none dark:text-white transition-all">
                    </div>
                </div>

                <div class="flex flex-col items-center" id="field-preview">
                    <div id="preview-box" class="w-64 h-64 bg-slate-100 dark:bg-slate-800 rounded-[3rem] overflow-hidden relative border-8 border-slate-200 dark:border-slate-700 shadow-xl cursor-move active:cursor-grabbing" style="-webkit-mask-image: -webkit-radial-gradient(white, black);">
                        <img id="preview-img" src="" class="absolute inset-0 w-full h-full object-contain pointer-events-none">
                    </div>
                    <div class="w-full mt-8 space-y-4" id="field-zoom">
                        <div class="flex justify-between text-[10px] font-black text-slate-400 uppercase tracking-widest">
                            <span>Zoom</span>
                            <span id="zoom-val" class="text-blue-600 font-bold">1.0x</span>
                        </div>
                        <input type="range" id="input-zoom" min="0.5" max="4" step="0.01" value="1">
                    </div>
                </div>

                <!-- Save button spans full width if preview is hidden -->
                <div class="col-span-1 md:col-span-2 flex justify-end mt-2">
                    <button onclick="window.saveChanges()" id="modal-save-btn" class="w-full md:w-auto px-10 py-5 bg-blue-900 text-white rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-blue-800 transition-all active:scale-95">
                        Save Changes
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Realtime Sync Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- State ---
        let useFirebase = false;
        let auth = null;
        let db = null;
        let currentUser = null;
        let isAdmin = false;
        let isEditing = false;
        
        const appId = 'pack-26-resources';
        
        // Apply saved theme immediately
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        // Initialize Categories, Links & Settings from Local Storage (Fallbacks)
        let categories = JSON.parse(localStorage.getItem('scout_categories')) || [
            { id: 'default', title: 'General Resources' }
        ];

        let links = JSON.parse(localStorage.getItem('scout_links')) || [
            { id: 1, title: 'Scoutbook', url: 'https://scoutbook.scouting.org/', img: '', zoom: 1, x: 0, y: 0, categoryId: 'default' },
            { id: 2, title: 'Calendar', url: '#', img: '', zoom: 1, x: 0, y: 0, categoryId: 'default' },
            { id: 3, title: 'Uniforms', url: 'https://www.scoutshop.org/', img: '', zoom: 1, x: 0, y: 0, categoryId: 'default' }
        ];

        // Ensure all legacy links have a category assigned
        links.forEach(l => {
            if (!l.categoryId) l.categoryId = 'default';
        });

        let settings = JSON.parse(localStorage.getItem('scout_settings')) || {
            title: 'Pack 26',
            subtitle: 'Scouting America',
            logo: 'https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png',
            zoom: 1, x: 0, y: 0
        };

        let currentEditId = null;
        let currentEditType = null; // 'header', 'category', 'link'
        let isDragging = false;
        let startX, startY;

        // --- Custom Toast Notification Function ---
        window.showToast = function(message, isError = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `px-6 py-3 rounded-2xl font-bold uppercase tracking-widest text-xs shadow-2xl transition-all duration-300 transform translate-y-[-20px] opacity-0 flex items-center gap-2 ${isError ? 'bg-red-600 text-white' : 'bg-green-500 text-white'}`;
            
            const iconName = isError ? 'alert-triangle' : 'cloud';
            toast.innerHTML = `<i data-lucide="${iconName}" class="w-4 h-4"></i> ${message}`;
            
            container.appendChild(toast);
            if (window.lucide) window.lucide.createIcons();

            setTimeout(() => {
                toast.classList.remove('translate-y-[-20px]', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');
            }, 10);

            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-[-20px]', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        };

        // --- Firebase Init ---
        let fbConfig = null;
        try {
            if (typeof window.__firebase_config !== 'undefined') {
                fbConfig = JSON.parse(window.__firebase_config);
            }
        } catch (e) {}

        if (!fbConfig || !fbConfig.apiKey) {
            fbConfig = {
                apiKey: "AIzaSyCwmME4nKhlE2i6ygpimyuU29F5KOcEB3o",
                authDomain: "pack-26-resources.firebaseapp.com",
                projectId: "pack-26-resources",
                storageBucket: "pack-26-resources.firebasestorage.app",
                messagingSenderId: "1033254465829",
                appId: "1:1033254465829:web:e78f1364ea09206568eacc"
            };
        }

        if (fbConfig && fbConfig.apiKey) {
            const app = initializeApp(fbConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            useFirebase = true;
        } else {
            console.warn("No Firebase Configuration found. App is running in Local Mode.");
        }

        // --- Auth & Sync Loop ---
        if (useFirebase) {
            const initAuth = async () => {
                try {
                    if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                        await signInWithCustomToken(auth, window.__initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (e) {
                    console.error("Firebase Auth Failed:", e);
                }
            };
            
            initAuth().then(() => {
                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'packData', 'config');
                        onSnapshot(docRef, (snap) => {
                            if (snap.exists()) {
                                const data = snap.data();
                                if (data.categories) categories = data.categories;
                                else if (!data.categories && categories.length === 0) {
                                    categories = [{ id: 'default', title: 'General Resources' }];
                                }
                                
                                if (data.links) {
                                    links = data.links;
                                    links.forEach(l => { if (!l.categoryId) l.categoryId = 'default'; });
                                }
                                if (data.settings) settings = data.settings;
                                window.render();
                            } else {
                                window.syncToCloud(); 
                            }
                        }, (error) => {
                            console.error("Sync Error: ", error);
                        });
                    }
                });
            });
        }

        window.syncToCloud = async function() {
            if (!useFirebase || !currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'packData', 'config');
                await setDoc(docRef, { links, settings, categories, updatedAt: Date.now() });
                window.showToast("Cloud Sync Successful!");
            } catch (error) {
                console.error("Failed to push updates to cloud:", error);
                window.showToast("Failed to sync to cloud", true);
            }
        };

        // --- Core Functions ---
        window.render = function() {
            const container = document.getElementById('links-container');
            if (!container) return;
            
            container.innerHTML = '';

            // Main Category Flex Wrapper (Allows side-by-side 3 across)
            const categoryWrapper = document.createElement('div');
            categoryWrapper.id = 'category-wrapper';
            categoryWrapper.className = 'flex flex-wrap justify-center gap-6 md:gap-8 items-start w-full';

            // Render Each Category Section (Bubble)
            categories.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'category-section w-full sm:w-[calc(50%-1.5rem)] lg:w-[calc(33.333%-2rem)] min-w-[300px] max-w-lg bg-slate-100 dark:bg-slate-800 rounded-[3rem] p-6 sm:p-8 shadow-xl border border-white dark:border-slate-700 flex flex-col relative';
                section.dataset.id = cat.id;

                // Category Header
                const headerFlex = document.createElement('div');
                headerFlex.className = 'flex items-center justify-between gap-4 mb-6 px-2';
                headerFlex.innerHTML = `
                    <h2 class="text-blue-900 dark:text-blue-400 font-black uppercase tracking-widest text-lg">${cat.title}</h2>
                    ${isEditing ? `
                        <div class="flex gap-2 no-drag">
                            <button class="category-drag-handle p-2 bg-white dark:bg-slate-900 text-slate-400 hover:text-blue-600 rounded-xl shadow-sm hover:shadow-md transition-all border border-slate-200 dark:border-slate-700 cursor-move" title="Drag to reorder"><i data-lucide="grip-horizontal" class="w-4 h-4 pointer-events-none"></i></button>
                            <button onclick="window.editCategory('${cat.id}')" class="p-2 bg-white dark:bg-slate-900 text-slate-400 hover:text-blue-600 rounded-xl shadow-sm hover:shadow-md transition-all border border-slate-200 dark:border-slate-700"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                            <button onclick="window.deleteCategory('${cat.id}')" class="p-2 bg-white dark:bg-slate-900 text-slate-400 hover:text-red-600 rounded-xl shadow-sm hover:shadow-md transition-all border border-slate-200 dark:border-slate-700"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    ` : ''}
                `;
                section.appendChild(headerFlex);

                // Grid for links (ALWAYS 3 columns)
                const grid = document.createElement('div');
                grid.className = 'link-grid grid grid-cols-3 gap-3 sm:gap-4 min-h-[120px]'; // Min height ensures empty categories can accept drops
                grid.dataset.categoryId = cat.id;

                const catLinks = links.filter(l => l.categoryId === cat.id);
                
                catLinks.forEach(link => {
                    const card = document.createElement('div');
                    card.className = `link-card relative group ${isEditing ? 'cursor-move' : ''}`;
                    card.dataset.id = link.id;
                    card.innerHTML = `
                        ${isEditing ? `
                            <div class="absolute top-2 right-2 z-20 flex flex-col gap-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity no-drag cursor-default">
                                <button onclick="window.editLink(${link.id})" class="p-1.5 bg-blue-600 text-white rounded-lg shadow-lg hover:scale-110 transition-transform">
                                    <i data-lucide="edit-2" class="w-3 h-3"></i>
                                </button>
                                <button onclick="window.deleteLink(${link.id})" class="p-1.5 bg-red-600 text-white rounded-lg shadow-lg hover:scale-110 transition-transform">
                                    <i data-lucide="trash-2" class="w-3 h-3"></i>
                                </button>
                            </div>
                        ` : ''}
                        <a href="${isEditing ? 'javascript:void(0)' : link.url}" target="_blank" class="scout-card p-3 md:p-4 flex flex-col items-center justify-start text-center block h-full pointer-events-none">
                            <div class="image-viewport mb-3">
                                <img src="${link.img || 'https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png'}" 
                                     style="transform: translate(${link.x || 0}%, ${link.y || 0}%) scale(${link.zoom || 1}); opacity: ${link.img ? 1 : 0.1}"
                                     class="absolute inset-0 w-full h-full object-contain pointer-events-none">
                            </div>
                            <span class="text-blue-900 dark:text-slate-200 font-extrabold uppercase tracking-widest text-[9px] sm:text-[10px] line-clamp-2 leading-tight">${link.title}</span>
                        </a>
                    `;
                    // Note: We use pointer-events-none on the <a> tag when editing so it doesn't interrupt dragging
                    if (!isEditing) {
                        card.querySelector('a').classList.remove('pointer-events-none');
                    }
                    grid.appendChild(card);
                });

                if (isEditing) {
                    const addBtn = document.createElement('button');
                    addBtn.onclick = () => window.addNewLink(cat.id);
                    addBtn.className = 'no-drag scout-card border-4 border-dashed border-slate-300 dark:border-slate-700 bg-transparent flex flex-col items-center justify-center p-3 opacity-50 hover:opacity-100 hover:border-blue-500 cursor-pointer transition-all h-full min-h-[120px] w-full';
                    addBtn.innerHTML = `
                        <i data-lucide="plus" class="w-8 h-8 text-slate-400 mb-2 pointer-events-none"></i>
                        <span class="font-black text-slate-400 uppercase tracking-widest pointer-events-none text-[9px] leading-tight text-center">Add Link</span>
                    `;
                    grid.appendChild(addBtn);
                }

                section.appendChild(grid);
                categoryWrapper.appendChild(section);
            });

            container.appendChild(categoryWrapper);

            // Add Category Button at the very bottom
            if (isEditing) {
                const addCatWrapper = document.createElement('div');
                addCatWrapper.className = 'mt-12 flex justify-center w-full';
                addCatWrapper.innerHTML = `
                    <button onclick="window.addNewCategory()" class="px-8 py-4 bg-white dark:bg-slate-900 border-4 border-dashed border-slate-300 dark:border-slate-700 rounded-[2rem] text-slate-400 font-black uppercase tracking-widest hover:border-blue-500 hover:text-blue-500 transition-colors flex items-center gap-3 shadow-lg">
                        <i data-lucide="plus-circle" class="w-6 h-6"></i> Add New Category
                    </button>
                `;
                container.appendChild(addCatWrapper);
            }

            // Sync Header Texts & Logo
            document.getElementById('display-title').innerText = settings.title;
            document.getElementById('display-subtitle').innerText = settings.subtitle;
            const logo = document.getElementById('main-logo');
            logo.src = settings.logo;
            logo.style.transform = `translate(${settings.x || 0}%, ${settings.y || 0}%) scale(${settings.zoom || 1})`;

            // Render Dynamic UI Buttons Based on State
            const isDark = document.documentElement.classList.contains('dark');
            const themeBtn = document.getElementById('theme-btn');
            themeBtn.innerHTML = isDark ? '<i data-lucide="sun" class="w-5 h-5"></i>' : '<i data-lucide="moon" class="w-5 h-5"></i>';

            const lockBtn = document.getElementById('lock-btn');
            if (isAdmin) {
                lockBtn.className = "w-12 h-12 rounded-[1rem] flex items-center justify-center bg-yellow-400 shadow-2xl transition-all hover:scale-110 active:scale-95 z-50";
                lockBtn.innerHTML = '<i data-lucide="unlock" class="text-blue-900 w-5 h-5"></i>';
            } else {
                lockBtn.className = "w-12 h-12 rounded-[1rem] flex items-center justify-center bg-blue-900 shadow-2xl transition-all hover:scale-110 active:scale-95 z-50";
                lockBtn.innerHTML = '<i data-lucide="lock" class="text-white w-5 h-5"></i>';
            }

            const adminBtn = document.getElementById('admin-toggle-btn');
            if (isAdmin) {
                adminBtn.classList.remove('hidden');
                if (isEditing) {
                    adminBtn.innerHTML = '<i data-lucide="settings" class="w-4 h-4 text-blue-900"></i><span class="text-xs">Finish</span>';
                    adminBtn.className = "flex items-center gap-2 px-4 py-3 rounded-xl bg-yellow-400 text-blue-900 border-2 border-yellow-400 font-bold uppercase tracking-widest shadow-lg transition-all";
                } else {
                    adminBtn.innerHTML = '<i data-lucide="settings" class="w-4 h-4"></i><span class="text-xs">Admin</span>';
                    adminBtn.className = "flex items-center gap-2 px-4 py-3 rounded-xl bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 font-bold uppercase tracking-widest shadow-lg transition-all hover:bg-slate-50 dark:hover:bg-slate-700";
                }
            } else {
                adminBtn.classList.add('hidden');
            }

            const headerBtn = document.getElementById('edit-header-btn');
            const textBtn = document.getElementById('edit-text-btn');
            if (isEditing) {
                headerBtn.classList.remove('hidden');
                headerBtn.innerHTML = '<i data-lucide="edit-3" class="w-5 h-5"></i>';
                if (textBtn) {
                    textBtn.classList.remove('hidden');
                    textBtn.innerHTML = '<i data-lucide="edit-3" class="w-5 h-5"></i>';
                }
            } else {
                headerBtn.classList.add('hidden');
                if (textBtn) textBtn.classList.add('hidden');
            }

            if (window.lucide) window.lucide.createIcons();
            
            // Initialization of SortableJS logic
            if (isEditing && window.Sortable) {
                // Initialize Category Reordering
                new Sortable(document.getElementById('category-wrapper'), {
                    animation: 250,
                    handle: '.category-drag-handle',
                    easing: "cubic-bezier(1, 0, 0, 1)",
                    onEnd: function() {
                        const newCategories = [];
                        document.querySelectorAll('.category-section').forEach(el => {
                            const cat = categories.find(c => c.id === el.dataset.id);
                            if (cat) newCategories.push(cat);
                        });
                        categories = newCategories;
                        window.syncToCloud();
                    }
                });

                // Initialize Tile Drag & Drop inside and across Categories
                document.querySelectorAll('.link-grid').forEach(grid => {
                    new Sortable(grid, {
                        group: 'shared-links',
                        animation: 250,
                        easing: "cubic-bezier(1, 0, 0, 1)",
                        filter: '.no-drag', // Stop Add/Edit buttons from being draggable
                        preventOnFilter: false,
                        onMove: function (evt) {
                            // Don't allow placing an item *after* the "Add Link" button
                            return evt.related.className.indexOf('no-drag') === -1;
                        },
                        onEnd: function() {
                            const newLinks = [];
                            document.querySelectorAll('.link-grid').forEach(g => {
                                const catId = g.dataset.categoryId;
                                g.querySelectorAll('.link-card').forEach(card => {
                                    const id = parseInt(card.dataset.id);
                                    const linkObj = links.find(l => l.id === id);
                                    if (linkObj) {
                                        linkObj.categoryId = catId; // Assign new category if moved
                                        newLinks.push(linkObj);
                                    }
                                });
                            });
                            links = newLinks;
                            window.syncToCloud();
                        }
                    });
                });
            }

            localStorage.setItem('scout_links', JSON.stringify(links));
            localStorage.setItem('scout_settings', JSON.stringify(settings));
            localStorage.setItem('scout_categories', JSON.stringify(categories));
        };

        // --- Admin Actions ---
        window.handleAuthClick = function() {
            if (isAdmin) {
                isAdmin = false;
                isEditing = false; 
                const adminBtn = document.getElementById('admin-toggle-btn');
                if (adminBtn) adminBtn.classList.add('hidden');
                window.render();
            } else {
                const pass = prompt("Enter Leader Access Key:");
                if (pass === 'CoRf121') {
                    isAdmin = true;
                    isEditing = false;
                    window.render();
                }
            }
        };

        window.toggleAdminMode = function() {
            isEditing = !isEditing;
            window.render();
        };

        window.toggleDarkMode = function() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            window.render();
        };

        // --- Modals & Dynamic Form Logic ---
        function setModalVisibility(type) {
            const mGrid = document.getElementById('modal-grid');
            const fUrl = document.getElementById('field-url');
            const fImg = document.getElementById('field-image');
            const fCat = document.getElementById('field-category');
            const fPrev = document.getElementById('field-preview');
            const fBtn = document.getElementById('modal-save-btn');

            if (type === 'category') {
                mGrid.classList.remove('md:grid-cols-2');
                mGrid.classList.add('grid-cols-1');
                fUrl.classList.add('hidden');
                fImg.classList.add('hidden');
                fCat.classList.add('hidden');
                fPrev.classList.add('hidden');
                fBtn.classList.replace('w-full', 'w-auto');
            } else {
                mGrid.classList.add('md:grid-cols-2');
                mGrid.classList.remove('grid-cols-1');
                fUrl.classList.remove('hidden');
                fImg.classList.remove('hidden');
                fPrev.classList.remove('hidden');
                fBtn.classList.replace('w-auto', 'w-full');
                
                if (type === 'link') {
                    fCat.classList.remove('hidden');
                } else {
                    fCat.classList.add('hidden'); // hidden for header
                }
            }
        }

        window.openHeaderModal = function() {
            currentEditId = 'header';
            currentEditType = 'header';
            document.getElementById('modal-title').innerText = "Identity Settings";
            document.getElementById('label-url').innerText = "Subtitle";
            document.getElementById('input-title').value = settings.title;
            document.getElementById('input-url').value = settings.subtitle;
            document.getElementById('input-image').value = settings.logo;
            document.getElementById('input-zoom').value = settings.zoom || 1;
            
            setModalVisibility('header');
            window.updatePreview();
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
        };

        // POPULATE CATEGORY DROPDOWN
        function populateCategoryDropdown(selectedId) {
            const select = document.getElementById('input-category');
            select.innerHTML = '';
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat.id;
                opt.innerText = cat.title;
                if (cat.id === selectedId) opt.selected = true;
                select.appendChild(opt);
            });
        }

        window.editLink = function(id) {
            currentEditId = id;
            currentEditType = 'link';
            const link = links.find(l => l.id === id);
            
            document.getElementById('modal-title').innerText = "Tile Settings";
            document.getElementById('label-url').innerText = "URL";
            document.getElementById('input-title').value = link.title;
            document.getElementById('input-url').value = link.url;
            document.getElementById('input-image').value = link.img;
            document.getElementById('input-zoom').value = link.zoom || 1;
            
            populateCategoryDropdown(link.categoryId);
            setModalVisibility('link');
            window.updatePreview();
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
        };

        window.addNewLink = function(categoryId) {
            const newId = Date.now();
            links.push({ id: newId, title: 'New Link', url: '', img: '', zoom: 1, x: 0, y: 0, categoryId: categoryId });
            window.editLink(newId);
        };

        window.deleteLink = function(id) {
            if (confirm("Remove this tile?")) {
                links = links.filter(l => l.id !== id);
                window.render();
                window.syncToCloud();
            }
        };

        // --- Categories Logic ---
        window.editCategory = function(id) {
            currentEditId = id;
            currentEditType = 'category';
            const cat = categories.find(c => c.id === id);

            document.getElementById('modal-title').innerText = "Category Name";
            document.getElementById('input-title').value = cat.title;
            
            setModalVisibility('category');
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
        }

        window.addNewCategory = function() {
            const newId = 'cat_' + Date.now();
            categories.push({ id: newId, title: 'New Category' });
            window.editCategory(newId);
        }

        window.deleteCategory = function(id) {
            if (confirm("Are you sure you want to delete this category AND all the links inside it?")) {
                categories = categories.filter(c => c.id !== id);
                links = links.filter(l => l.categoryId !== id); // cascade delete links
                window.render();
                window.syncToCloud();
            }
        }

        window.closeModal = function() {
            document.getElementById('modal-overlay').classList.replace('flex', 'hidden');
        };

        window.updatePreview = function() {
            if (currentEditType === 'category') return; // no preview for categories

            const img = document.getElementById('preview-img');
            const zoom = document.getElementById('input-zoom').value || 1;
            img.src = document.getElementById('input-image').value || 'https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png';
            document.getElementById('zoom-val').innerText = parseFloat(zoom).toFixed(2) + 'x';
            
            let obj = currentEditType === 'header' ? settings : links.find(l => l.id === currentEditId);
            if (obj) {
                img.style.transform = `translate(${obj.x || 0}%, ${obj.y || 0}%) scale(${zoom})`;
            }
        };

        window.saveChanges = function() {
            if (currentEditType === 'header') {
                settings.title = document.getElementById('input-title').value;
                settings.subtitle = document.getElementById('input-url').value;
                settings.logo = document.getElementById('input-image').value;
                settings.zoom = document.getElementById('input-zoom').value;
            } else if (currentEditType === 'category') {
                const cat = categories.find(c => c.id === currentEditId);
                if (cat) cat.title = document.getElementById('input-title').value || 'Unnamed Category';
            } else if (currentEditType === 'link') {
                const link = links.find(l => l.id === currentEditId);
                if (link) {
                    link.title = document.getElementById('input-title').value;
                    let safeUrl = document.getElementById('input-url').value.trim();
                    if (safeUrl && !safeUrl.startsWith('http')) safeUrl = 'https://' + safeUrl;
                    link.url = safeUrl;
                    link.categoryId = document.getElementById('input-category').value;
                    link.img = document.getElementById('input-image').value;
                    link.zoom = document.getElementById('input-zoom').value;
                }
            }
            window.closeModal();
            window.render();
            window.syncToCloud(); 
        };

        // --- Event Listeners ---
        document.getElementById('input-image').addEventListener('input', window.updatePreview);
        document.getElementById('input-zoom').addEventListener('input', window.updatePreview);

        const previewBox = document.getElementById('preview-box');
        previewBox.addEventListener('mousedown', (e) => {
            if (currentEditType === 'category') return;
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            startX = e.clientX;
            startY = e.clientY;

            // Normalize drag based on preview box size (Percentage-based drag)
            const previewRect = document.getElementById('preview-box').getBoundingClientRect();
            const percentX = (dx / previewRect.width) * 100;
            const percentY = (dy / previewRect.height) * 100;

            let obj = currentEditType === 'header' ? settings : links.find(l => l.id === currentEditId);
            if (obj) {
                obj.x = (obj.x || 0) + percentX;
                obj.y = (obj.y || 0) + percentY;
                window.updatePreview();
            }
        });

        window.addEventListener('mouseup', () => isDragging = false);

        window.onload = () => {
            window.render();
        };
    </script>
</body>
</html>
