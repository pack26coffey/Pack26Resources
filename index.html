<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Links Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root {
            --bsa-blue: #003F87;
            --bsa-red: #CE1126;
            --bsa-gold: #FDC82F;
        }
        
        body { 
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            transition: background-color 0.5s ease;
        }

        .dark body { 
            background-color: #020617; 
            color: #f8fafc; 
        }

        .scout-card {
            background: white; 
            border-radius: 1.5rem; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0,63,135,0.05); 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .dark .scout-card { 
            background: #0f172a; 
            border-color: rgba(255,255,255,0.05); 
        }

        .scout-card:hover { 
            transform: translateY(-8px) scale(1.02); 
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.1);
            border-color: var(--bsa-blue);
        }

        .plan-card {
            background: white;
            border-radius: 2rem;
            border-left: 8px solid var(--bsa-gold);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
        }

        .dark .plan-card {
            background: #1e293b;
            border-color: rgba(255,255,255,0.05);
            border-left-color: var(--bsa-gold);
        }

        .image-viewport { 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            position: relative; 
            overflow: hidden; 
            border-radius: 1rem; 
            background: #f1f5f9; 
            -webkit-mask-image: -webkit-radial-gradient(white, black);
            mask-image: radial-gradient(white, black);
            transform: translateZ(0);
        }

        .dark .image-viewport { background: #1e293b; }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 5px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--bsa-blue);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
        }

        .modal-animate {
            animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .sortable-ghost { opacity: 0.4; transform: scale(0.95); }
        .sortable-drag { cursor: grabbing !important; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }

        /* Custom Scrollbar for Textareas */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark textarea::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="min-h-screen relative">
    <div id="toast-container" class="fixed top-8 left-1/2 -translate-x-1/2 z-[1000] flex flex-col gap-3 pointer-events-none"></div>

    <div id="app">
        <!-- Header -->
        <header class="bg-white dark:bg-slate-900 border-b-[8px] border-yellow-400 shadow-xl px-6 py-6 transition-colors relative z-30">
            <div class="max-w-6xl mx-auto">
                <div class="flex flex-col md:flex-row items-center gap-6">
                    <div class="relative group">
                        <div id="header-logo-container" class="w-28 h-28 md:w-32 md:h-32 rounded-[2rem] bg-slate-50 dark:bg-slate-800 shadow-inner overflow-hidden border-4 border-white dark:border-slate-700 transition-all relative">
                            <img id="main-logo" src="https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png" class="absolute inset-0 w-full h-full object-contain">
                        </div>
                        <button id="edit-header-btn" onclick="window.openHeaderModal()" class="hidden absolute -bottom-2 -right-2 p-2.5 bg-blue-600 text-white rounded-xl shadow-xl hover:scale-110 transition-transform z-20">
                            <!-- Icon injected -->
                        </button>
                    </div>

                    <div class="text-center md:text-left flex-1 relative group pr-12">
                        <h1 id="display-title" class="text-4xl md:text-6xl font-black text-blue-900 dark:text-blue-500 uppercase tracking-tighter mb-1 leading-none">
                            Pack 26
                        </h1>
                        <div class="text-lg md:text-xl font-bold text-slate-400 dark:text-slate-500 uppercase tracking-[0.4em] flex items-center justify-center md:justify-start gap-3">
                            <span id="display-subtitle">Scouting America</span>
                        </div>
                        <button id="edit-text-btn" onclick="window.openHeaderModal()" class="hidden absolute top-1/2 -translate-y-1/2 right-0 md:-right-4 p-3 bg-blue-600 text-white rounded-xl shadow-xl hover:scale-110 transition-transform">
                            <!-- Icon injected -->
                        </button>
                    </div>

                    <div class="flex flex-col items-center md:items-end gap-3 mt-4 md:mt-0">
                        <div class="flex gap-4">
                            <button id="theme-btn" onclick="window.toggleDarkMode()" class="p-3 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-yellow-400 hover:text-blue-900 transition-all shadow-md flex items-center justify-center"></button>
                            <button id="admin-toggle-btn" onclick="window.toggleAdminMode()" class="hidden"></button>
                        </div>
                        <a href="https://my.scouting.org" target="_blank" class="text-[10px] md:text-xs font-black text-blue-800 dark:text-blue-400 hover:text-blue-600 dark:hover:text-blue-300 hover:underline uppercase tracking-widest flex items-center gap-1.5 transition-colors pr-1">
                            <i data-lucide="external-link" class="w-3.5 h-3.5"></i> my.scouting.org
                        </a>
                    </div>
                </div>

                <!-- Leader Navigation Tabs (Only visible to authenticated leaders) -->
                <div id="leader-nav" class="hidden mt-4 flex justify-center md:justify-start gap-4 border-t border-slate-200 dark:border-slate-800 pt-4">
                    <button onclick="window.switchView('links')" id="tab-links" class="px-6 py-2 rounded-full font-bold uppercase tracking-widest text-xs transition-colors shadow-sm">Resources</button>
                    <button onclick="window.switchView('planner')" id="tab-planner" class="px-6 py-2 rounded-full font-bold uppercase tracking-widest text-xs transition-colors shadow-sm">Pack Planner</button>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <main class="max-w-[90rem] mx-auto py-12 px-4 sm:px-6 flex flex-col items-center min-h-[50vh]" id="main-container">
            <!-- Content injected here -->
        </main>

        <!-- Auth & Footer -->
        <div class="fixed bottom-10 right-10 z-50">
            <button id="lock-btn" onclick="window.handleAuthClick()"></button>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[200] hidden items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-900 rounded-[3rem] w-full max-w-sm overflow-hidden flex flex-col shadow-2xl modal-animate border-b-[16px] border-yellow-400">
            <div class="bg-blue-900 p-6 text-white flex justify-between items-center">
                <h3 class="text-xl font-black uppercase tracking-widest flex items-center gap-2"><i data-lucide="shield-check" class="w-5 h-5"></i> Secure Access</h3>
                <button onclick="window.closeLoginModal()" class="p-2 hover:bg-white/10 rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-8 flex flex-col gap-6">
                <p class="text-xs text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest text-center leading-relaxed">
                    Enter <span class="text-blue-600 dark:text-blue-400">Plan121</span> for Planner<br>
                    Enter <span class="text-yellow-600 dark:text-yellow-400">CoRf121</span> for Admin
                </p>
                <div class="relative">
                    <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Access Key</label>
                    <div class="relative flex items-center">
                        <input type="password" id="login-password" class="w-full p-4 pr-12 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold text-lg outline-none focus:ring-4 ring-blue-900/10 dark:text-white transition-all tracking-widest" placeholder="••••••••" onkeydown="if(event.key === 'Enter') window.submitLogin()">
                        <button id="toggle-password-btn" onclick="window.togglePasswordVisibility()" class="absolute right-4 text-slate-400 hover:text-blue-600 transition-colors focus:outline-none">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                <button onclick="window.submitLogin()" class="w-full py-4 bg-yellow-400 text-blue-900 rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-yellow-300 transition-all active:scale-95 flex justify-center items-center gap-2">
                    Unlock <i data-lucide="key" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Universal Identity/Links Modal -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[100] hidden items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-900 rounded-[4rem] w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl modal-animate border-b-[16px] border-blue-900">
            <div class="bg-blue-900 p-8 text-white flex justify-between items-center">
                <h3 id="modal-title" class="text-2xl font-black uppercase tracking-widest">Settings</h3>
                <button onclick="window.closeModal()" class="p-3 hover:bg-white/10 rounded-full transition-colors"><i data-lucide="x"></i></button>
            </div>
            <div class="p-8 md:p-10 overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-12" id="modal-grid">
                <div class="space-y-6">
                    <div id="field-title">
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Title</label>
                        <input id="input-title" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold text-lg outline-none focus:ring-4 ring-blue-900/10 dark:text-white transition-all">
                    </div>
                    <div id="field-url">
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest" id="label-url">URL</label>
                        <input id="input-url" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl outline-none dark:text-white transition-all" placeholder="https://...">
                    </div>
                    <div id="field-category" class="hidden">
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Category</label>
                        <select id="input-category" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold outline-none focus:ring-4 ring-blue-900/10 dark:text-white transition-all appearance-none cursor-pointer"></select>
                    </div>
                    <div id="field-image">
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Image Source URL</label>
                        <input id="input-image" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl text-sm font-mono outline-none dark:text-white transition-all">
                    </div>
                </div>
                <div class="flex flex-col items-center" id="field-preview">
                    <div id="preview-box" class="w-64 h-64 bg-slate-100 dark:bg-slate-800 rounded-[3rem] overflow-hidden relative border-8 border-slate-200 dark:border-slate-700 shadow-xl cursor-move active:cursor-grabbing" style="-webkit-mask-image: -webkit-radial-gradient(white, black);">
                        <img id="preview-img" src="" class="absolute inset-0 w-full h-full object-contain pointer-events-none">
                    </div>
                    <div class="w-full mt-8 space-y-4" id="field-zoom">
                        <div class="flex justify-between text-[10px] font-black text-slate-400 uppercase tracking-widest">
                            <span>Zoom</span>
                            <span id="zoom-val" class="text-blue-600 font-bold">1.0x</span>
                        </div>
                        <input type="range" id="input-zoom" min="0.5" max="4" step="0.01" value="1">
                    </div>
                </div>
                <div class="col-span-1 md:col-span-2 flex justify-end mt-2">
                    <button onclick="window.saveChanges()" id="modal-save-btn" class="w-full md:w-auto px-10 py-5 bg-blue-900 text-white rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-blue-800 transition-all active:scale-95">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Planner Edit Modal -->
    <div id="planner-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[150] hidden items-center justify-center p-6 overflow-y-auto">
        <div class="bg-white dark:bg-slate-900 rounded-[3rem] w-full max-w-2xl overflow-hidden flex flex-col shadow-2xl modal-animate border-b-[16px] border-yellow-500 my-auto">
            <div class="bg-slate-800 p-6 text-white flex justify-between items-center border-b border-slate-700">
                <h3 id="plan-modal-title" class="text-xl font-black uppercase tracking-widest flex items-center gap-2"><i data-lucide="calendar" class="w-5 h-5 text-yellow-500"></i> Event Details</h3>
                <button onclick="window.closePlannerModal()" class="p-2 hover:bg-white/10 rounded-full transition-colors"><i data-lucide="x"></i></button>
            </div>
            <div class="p-8 space-y-6">
                <!-- Date & Time Row -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Date</label>
                        <input type="date" id="plan-date" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold outline-none focus:ring-4 ring-blue-900/10 dark:text-white transition-all cursor-pointer">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Time</label>
                        <select id="plan-time" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold outline-none focus:ring-4 ring-blue-900/10 dark:text-white transition-all appearance-none cursor-pointer"></select>
                    </div>
                </div>

                <!-- Configurable Dropdowns Row -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <div class="flex justify-between items-end mb-2">
                            <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Event Type</label>
                            <div class="flex gap-1">
                                <button onclick="window.manageArray('eventTypes', 'add')" class="text-blue-500 hover:text-blue-700 p-1"><i data-lucide="plus-circle" class="w-4 h-4"></i></button>
                                <button onclick="window.manageArray('eventTypes', 'remove')" class="text-red-400 hover:text-red-600 p-1"><i data-lucide="minus-circle" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                        <select id="plan-type" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold outline-none focus:ring-4 ring-blue-900/10 dark:text-white transition-all appearance-none cursor-pointer"></select>
                    </div>
                    <div>
                        <div class="flex justify-between items-end mb-2">
                            <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Lead Scouter</label>
                            <div class="flex gap-1">
                                <button onclick="window.manageArray('leaders', 'add')" class="text-blue-500 hover:text-blue-700 p-1"><i data-lucide="plus-circle" class="w-4 h-4"></i></button>
                                <button onclick="window.manageArray('leaders', 'remove')" class="text-red-400 hover:text-red-600 p-1"><i data-lucide="minus-circle" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                        <select id="plan-leader" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold outline-none focus:ring-4 ring-blue-900/10 dark:text-white transition-all appearance-none cursor-pointer"></select>
                    </div>
                </div>

                <!-- Title & Details -->
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Event Title</label>
                    <input id="plan-title" type="text" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold text-lg outline-none focus:ring-4 ring-blue-900/10 dark:text-white transition-all" placeholder="e.g. Pinewood Derby Weigh-in">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Event Details</label>
                    <textarea id="plan-details" rows="4" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl outline-none focus:ring-4 ring-blue-900/10 dark:text-white transition-all resize-none" placeholder="Provide details, location, requirements..."></textarea>
                </div>

                <div class="flex justify-end mt-4">
                    <button onclick="window.savePlan()" class="w-full px-10 py-5 bg-blue-900 text-white rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-blue-800 transition-all active:scale-95">Save Event</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Realtime Sync Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Core State ---
        let useFirebase = false;
        let auth = null;
        let db = null;
        let currentUser = null;
        
        let isAdmin = false;    // Edits Layout & Categories
        let isLeader = false;   // Views & Edits Planner
        let isEditing = false;  // Toggle state for Layout Edits
        let currentView = 'links'; // 'links' or 'planner'

        const appId = 'pack-26-resources';
        
        // Theme init
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        // --- Data State ---
        let categories = JSON.parse(localStorage.getItem('scout_categories')) || [{ id: 'default', title: 'General Resources' }];
        let links = JSON.parse(localStorage.getItem('scout_links')) || [
            { id: 1, title: 'Scoutbook', url: 'https://scoutbook.scouting.org/', img: '', zoom: 1, x: 0, y: 0, categoryId: 'default' }
        ];
        let settings = JSON.parse(localStorage.getItem('scout_settings')) || {
            title: 'Pack 26', subtitle: 'Scouting America', logo: 'https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png', zoom: 1, x: 0, y: 0
        };

        // Planner State
        let plans = JSON.parse(localStorage.getItem('scout_plans')) || [];
        let eventTypes = JSON.parse(localStorage.getItem('scout_event_types')) || ['Pack Meeting', 'Den Meeting', 'Campout', 'Blue & Gold', 'Pinewood Derby'];
        let leaders = JSON.parse(localStorage.getItem('scout_leaders')) || ['Cubmaster', 'Den Leader', 'Committee Chair'];

        let currentEditId = null;
        let currentEditType = null; 
        let isDragging = false;
        let startX, startY;

        // --- Toasts ---
        window.showToast = function(message, isError = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `px-6 py-3 rounded-2xl font-bold uppercase tracking-widest text-xs shadow-2xl transition-all duration-300 transform translate-y-[-20px] opacity-0 flex items-center gap-2 ${isError ? 'bg-red-600 text-white' : 'bg-green-500 text-white'}`;
            toast.innerHTML = `<i data-lucide="${isError ? 'alert-triangle' : 'cloud'}" class="w-4 h-4"></i> ${message}`;
            container.appendChild(toast);
            if (window.lucide) window.lucide.createIcons();
            setTimeout(() => { toast.classList.remove('translate-y-[-20px]', 'opacity-0'); toast.classList.add('translate-y-0', 'opacity-100'); }, 10);
            setTimeout(() => { toast.classList.remove('translate-y-0', 'opacity-100'); toast.classList.add('translate-y-[-20px]', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 4000);
        };

        // --- Firebase Init ---
        let fbConfig = null;
        try { if (typeof window.__firebase_config !== 'undefined') fbConfig = JSON.parse(window.__firebase_config); } catch (e) {}
        if (!fbConfig || !fbConfig.apiKey) {
            fbConfig = {
                apiKey: "AIzaSyCwmME4nKhlE2i6ygpimyuU29F5KOcEB3o", authDomain: "pack-26-resources.firebaseapp.com", projectId: "pack-26-resources", storageBucket: "pack-26-resources.firebasestorage.app", messagingSenderId: "1033254465829", appId: "1:1033254465829:web:e78f1364ea09206568eacc"
            };
        }

        if (fbConfig && fbConfig.apiKey) {
            const app = initializeApp(fbConfig); auth = getAuth(app); db = getFirestore(app); useFirebase = true;
        }

        if (useFirebase) {
            const initAuth = async () => {
                try {
                    if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) await signInWithCustomToken(auth, window.__initial_auth_token);
                    else await signInAnonymously(auth);
                } catch (e) { console.error("Firebase Auth Failed:", e); }
            };
            
            initAuth().then(() => {
                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'packData', 'config');
                        onSnapshot(docRef, (snap) => {
                            if (snap.exists()) {
                                const data = snap.data();
                                if (data.categories) categories = data.categories;
                                if (data.links) links = data.links;
                                if (data.settings) settings = data.settings;
                                if (data.plans) plans = data.plans;
                                if (data.eventTypes) eventTypes = data.eventTypes;
                                if (data.leaders) leaders = data.leaders;
                                window.render();
                            } else { window.syncToCloud(); }
                        }, (error) => console.error("Sync Error: ", error));
                    }
                });
            });
        }

        window.syncToCloud = async function() {
            if (!useFirebase || !currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'packData', 'config');
                await setDoc(docRef, { links, settings, categories, plans, eventTypes, leaders, updatedAt: Date.now() });
                window.showToast("Cloud Sync Successful!");
            } catch (error) { window.showToast("Failed to sync to cloud", true); }
        };

        // --- Render Engine ---
        window.render = function() {
            const container = document.getElementById('main-container');
            const leaderNav = document.getElementById('leader-nav');
            
            // Header Sync
            document.getElementById('display-title').innerText = settings.title;
            document.getElementById('display-subtitle').innerText = settings.subtitle;
            const logo = document.getElementById('main-logo');
            logo.src = settings.logo;
            logo.style.transform = `translate(${settings.x || 0}%, ${settings.y || 0}%) scale(${settings.zoom || 1})`;

            // Nav Visibility & State
            if (isLeader || isAdmin) {
                leaderNav.classList.remove('hidden');

                    // Convert 24h to 12h nicely
                    let timeStr = plan.time;
                    if(plan.time) {

                        let ampm = h >= 12 ? 'PM' : 'AM';
                        h = h % 12;
                        h = h ? h : 12;

                            <span class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">${dateStr}</span>
                            <span class="text-xl font-black text-blue-900 dark:text-blue-400 leading-none">${timeStr}</span>
                            <span class="text-[9px] font-bold uppercase tracking-widest text-slate-500 mt-2 bg-slate-100 dark:bg-slate-800 inline-block px-2 py-1 rounded w-fit">${plan.type}</span>

        // --- Planner Modals & Logic ---
        window.buildPlannerDropdowns = function(selectedType = '', selectedLeader = '', selectedTime = '') {
            const timeSelect = document.getElementById('plan-time');
            const typeSelect = document.getElementById('plan-type');
            const leaderSelect = document.getElementById('plan-leader');
            
            // Build Time (15m increments)
            timeSelect.innerHTML = '';
            for(let h=0; h<24; h++) {
                for(let m=0; m<60; m+=15) {
                    const hh = h.toString().padStart(2, '0');
                    const mm = m.toString().padStart(2, '0');
                    const val = `${hh}:${mm}`;
                    const opt = document.createElement('option');
                    opt.value = val;
                    // Format for display
                    let dispH = h % 12 || 12;
                    let ampm = h < 12 ? 'AM' : 'PM';
                    opt.text = `${dispH}:${mm} ${ampm}`;
                    if (val === selectedTime) opt.selected = true;
                    timeSelect.appendChild(opt);
                }
            }

            // Build Types
            typeSelect.innerHTML = '';
            eventTypes.forEach(t => {
                const opt = document.createElement('option'); opt.value = t; opt.text = t;
                if (t === selectedType) opt.selected = true;
                typeSelect.appendChild(opt);
            });

            // Build Leaders
            leaderSelect.innerHTML = '';
            leaders.forEach(l => {
                const opt = document.createElement('option'); opt.value = l; opt.text = l;
                if (l === selectedLeader) opt.selected = true;
                leaderSelect.appendChild(opt);
            });
        }

        window.manageArray = function(arrayName, action) {
            let arr = arrayName === 'eventTypes' ? eventTypes : leaders;
            const selectId = arrayName === 'eventTypes' ? 'plan-type' : 'plan-leader';
            const selectEl = document.getElementById(selectId);
            
            if (action === 'add') {
                const item = prompt(`Enter new ${arrayName === 'eventTypes' ? 'Event Type' : 'Leader'}:`);
                if (item && item.trim() && !arr.includes(item.trim())) {
                    arr.push(item.trim());
                    window.syncToCloud();
                    window.buildPlannerDropdowns(
                        arrayName === 'eventTypes' ? item.trim() : document.getElementById('plan-type').value, 
                        arrayName === 'leaders' ? item.trim() : document.getElementById('plan-leader').value,
                        document.getElementById('plan-time').value
                    );
                }
            } else if (action === 'remove') {
                const val = selectEl.value;
                if (val && confirm(`Permanently remove "${val}" from the list?`)) {
                    if(arrayName === 'eventTypes') {
                        eventTypes = eventTypes.filter(i => i !== val);
                    } else {
                        leaders = leaders.filter(i => i !== val);
                    }
                    window.syncToCloud();
                    window.buildPlannerDropdowns(
                        document.getElementById('plan-type').value, 
                        document.getElementById('plan-leader').value,
                        document.getElementById('plan-time').value
                    );
                }
            }
        }

        window.openPlannerModal = function(id = null) {
            currentEditId = id;
            let plan = id ? plans.find(p => p.id === id) : null;
            
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];

            document.getElementById('plan-modal-title').innerHTML = `<i data-lucide="calendar" class="w-5 h-5 text-yellow-500"></i> ${plan ? 'Edit Event' : 'New Event'}`;
            document.getElementById('plan-date').value = plan ? plan.date : todayStr;
            document.getElementById('plan-title').value = plan ? plan.title : '';
            document.getElementById('plan-details').value = plan ? plan.details : '';
            
            window.buildPlannerDropdowns(plan?.type, plan?.leader, plan?.time || '18:00');
            
            document.getElementById('planner-modal').classList.replace('hidden', 'flex');
            if (window.lucide) window.lucide.createIcons();
        }

        window.closePlannerModal = () => document.getElementById('planner-modal').classList.replace('flex', 'hidden');

        window.savePlan = function() {
            const date = document.getElementById('plan-date').value;
            const time = document.getElementById('plan-time').value;
            const type = document.getElementById('plan-type').value;
            const title = document.getElementById('plan-title').value;
            const details = document.getElementById('plan-details').value;
            const leader = document.getElementById('plan-leader').value;

            if(!title || !date) {
                window.showToast("Date and Title are required", true);
                return;
            }

            const currentTimestamp = Date.now();

            if (currentEditId) {
                const p = plans.find(p => p.id === currentEditId);
                if (p) {
                    p.date = date; p.time = time; p.type = type; p.title = title; p.details = details; p.leader = leader; p.editedAt = currentTimestamp;
                }
            } else {
                plans.push({
                    id: currentTimestamp, createdAt: currentTimestamp, date, time, type, title, details, leader
                });
            }

            window.closePlannerModal();
            window.render();
            window.syncToCloud();
        }

        window.deletePlan = function(id) {
            if(confirm("Remove this event from the planner?")) {
                plans = plans.filter(p => p.id !== id);
                window.render();
                window.syncToCloud();
            }
        }

        function setModalVisibility(type) {

            } else {
                mGrid.classList.add('md:grid-cols-2'); mGrid.classList.remove('grid-cols-1');
                fUrl.classList.remove('hidden'); fImg.classList.remove('hidden'); fPrev.classList.remove('hidden'); fBtn.classList.replace('w-auto', 'w-full');
                if (type === 'link') fCat.classList.remove('hidden'); else fCat.classList.add('hidden');
            }

        window.openHeaderModal = function() {
            currentEditId = 'header'; currentEditType = 'header';
            document.getElementById('modal-title').innerText = "Identity Settings"; document.getElementById('label-url').innerText = "Subtitle";
            document.getElementById('input-title').value = settings.title; document.getElementById('input-url').value = settings.subtitle;

        window.editLink = function(id) {
            currentEditId = id; currentEditType = 'link'; const link = links.find(l => l.id === id);
            document.getElementById('modal-title').innerText = "Tile Settings"; document.getElementById('label-url').innerText = "URL";
            document.getElementById('input-title').value = link.title; document.getElementById('input-url').value = link.url;
            document.getElementById('input-image').value = link.img; document.getElementById('input-zoom').value = link.zoom || 1;
            
            const select = document.getElementById('input-category'); select.innerHTML = '';
            categories.forEach(cat => { const opt = document.createElement('option'); opt.value = cat.id; opt.innerText = cat.title; if (cat.id === link.categoryId) opt.selected = true; select.appendChild(opt); });
            setModalVisibility('link'); window.updatePreview(); document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
        };

        window.addNewLink = function(categoryId) {
            const newId = Date.now(); links.push({ id: newId, title: 'New Link', url: '', img: '', zoom: 1, x: 0, y: 0, categoryId: categoryId }); window.editLink(newId);

        window.editCategory = function(id) {
            currentEditId = id; currentEditType = 'category'; const cat = categories.find(c => c.id === id);
            document.getElementById('modal-title').innerText = "Category Name"; document.getElementById('input-title').value = cat.title;
            setModalVisibility('category'); document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
        }

        window.addNewCategory = function() {
            const newId = 'cat_' + Date.now(); categories.push({ id: newId, title: 'New Category' }); window.editCategory(newId);
        }

        window.deleteCategory = function(id) {
            if (confirm("Delete this category AND all links inside it?")) { categories = categories.filter(c => c.id !== id); links = links.filter(l => l.categoryId !== id); window.render(); window.syncToCloud(); }
        }

        window.closeModal = () => document.getElementById('modal-overlay').classList.replace('flex', 'hidden');

        window.updatePreview = function() {
            if (currentEditType === 'category') return;
            const img = document.getElementById('preview-img'); const zoom = document.getElementById('input-zoom').value || 1;
            img.src = document.getElementById('input-image').value || 'https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png';
            document.getElementById('zoom-val').innerText = parseFloat(zoom).toFixed(2) + 'x';
            let obj = currentEditType === 'header' ? settings : links.find(l => l.id === currentEditId);
            if (obj) img.style.transform = `translate(${obj.x || 0}%, ${obj.y || 0}%) scale(${zoom})`;
        };

        window.saveChanges = function() {
            if (currentEditType === 'header') {
                settings.title = document.getElementById('input-title').value; settings.subtitle = document.getElementById('input-url').value; settings.logo = document.getElementById('input-image').value; settings.zoom = document.getElementById('input-zoom').value;
            } else if (currentEditType === 'category') {
                const cat = categories.find(c => c.id === currentEditId); if (cat) cat.title = document.getElementById('input-title').value || 'Unnamed Category';
            } else if (currentEditType === 'link') {
                const link = links.find(l => l.id === currentEditId);
                if (link) {
                    link.title = document.getElementById('input-title').value;
                    let safeUrl = document.getElementById('input-url').value.trim(); if (safeUrl && !safeUrl.startsWith('http')) safeUrl = 'https://' + safeUrl;
                    link.url = safeUrl; link.categoryId = document.getElementById('input-category').value; link.img = document.getElementById('input-image').value; link.zoom = document.getElementById('input-zoom').value;
                }
            }
            window.closeModal(); window.render(); window.syncToCloud(); 
        };

        // --- Mouse Drag Events ---
        document.getElementById('input-image').addEventListener('input', window.updatePreview);
        document.getElementById('input-zoom').addEventListener('input', window.updatePreview);

        const previewBox = document.getElementById('preview-box');
        previewBox.addEventListener('mousedown', (e) => { if (currentEditType === 'category') return; isDragging = true; startX = e.clientX; startY = e.clientY; });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - startX; const dy = e.clientY - startY; startX = e.clientX; startY = e.clientY;
            const previewRect = document.getElementById('preview-box').getBoundingClientRect();
            let obj = currentEditType === 'header' ? settings : links.find(l => l.id === currentEditId);
            if (obj) { obj.x = (obj.x || 0) + ((dx / previewRect.width) * 100); obj.y = (obj.y || 0) + ((dy / previewRect.height) * 100); window.updatePreview(); }
        });
        window.addEventListener('mouseup', () => isDragging = false);
        window.onload = () => window.render();
    </script>
</body>
</html>
