<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Links Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scout-shadow { shadow-color: rgba(30, 58, 138, 0.2); }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 18px;
            height: 18px;
            background: #1e40af;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-300" id="body-tag">
    <div id="app" class="min-h-screen pb-20">
        <!-- Header -->
        <header class="bg-white border-b-8 border-yellow-400 py-10 px-6 shadow-xl relative overflow-hidden">
            <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-8">
                <div class="relative group">
                    <div id="header-logo-container" class="w-32 h-32 md:w-40 md:h-40 bg-slate-50 rounded-[2rem] flex items-center justify-center overflow-hidden border-4 border-white shadow-inner">
                        <img id="display-logo" src="https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png" class="h-full object-contain transition-transform">
                    </div>
                    <button id="btn-edit-header" class="hidden absolute -bottom-2 -right-2 p-3 bg-blue-600 text-white rounded-2xl shadow-lg hover:scale-110 transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
                <div class="text-center md:text-left flex-1">
                    <h1 id="display-title" class="text-4xl md:text-6xl font-black uppercase tracking-tighter text-blue-900 leading-none mb-2">Scout Resources</h1>
                    <p id="display-subtitle" class="text-slate-400 font-bold uppercase tracking-widest text-sm">Pack 505 • Troop 101</p>
                </div>
                <div class="flex gap-3">
                    <button id="btn-theme" class="p-4 bg-slate-100 rounded-2xl text-slate-600 hover:bg-slate-200 transition-colors">
                        <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                    </button>
                    <button id="btn-toggle-edit" class="hidden px-6 py-4 bg-blue-800 text-white rounded-2xl font-black uppercase tracking-widest shadow-lg hover:bg-blue-700 transition-all">Edit Mode</button>
                </div>
            </div>
        </header>

        <!-- Grid -->
        <main class="max-w-7xl mx-auto py-12 px-6">
            <div id="links-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Links injected here -->
            </div>
        </main>

        <!-- Admin Access Trigger -->
        <div class="fixed bottom-6 right-6">
            <button id="btn-admin-lock" class="w-14 h-14 bg-blue-900 text-white rounded-2xl flex items-center justify-center shadow-2xl hover:scale-105 transition-transform">
                <svg id="lock-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </button>
        </div>

        <!-- Modals -->
        <div id="modal-overlay" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] hidden items-center justify-center p-4">
            <!-- Login Modal -->
            <div id="modal-login" class="bg-white p-8 rounded-[2.5rem] w-full max-w-sm shadow-2xl hidden">
                <h2 class="text-2xl font-black uppercase text-center mb-6">Leader Login</h2>
                <input type="password" id="admin-pass" placeholder="Access Key" class="w-full p-4 bg-slate-100 rounded-xl mb-4 text-center text-xl font-bold outline-none border-2 border-transparent focus:border-blue-500">
                <div class="flex gap-2">
                    <button onclick="closeModals()" class="flex-1 font-bold text-slate-400">Cancel</button>
                    <button id="btn-do-login" class="flex-[2] bg-blue-800 text-white p-4 rounded-xl font-black uppercase tracking-widest">Unlock</button>
                </div>
            </div>

            <!-- Edit Modal -->
            <div id="modal-edit" class="bg-white rounded-[2.5rem] w-full max-w-2xl shadow-2xl hidden overflow-hidden">
                <div class="bg-blue-800 p-6 text-white flex justify-between items-center">
                    <h3 id="modal-title" class="font-black uppercase tracking-widest">Edit Resource</h3>
                    <button onclick="closeModals()"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
                </div>
                <div class="p-8 space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-black uppercase opacity-50 block mb-1">Label</label>
                                <input id="edit-label" type="text" class="w-full p-3 bg-slate-100 rounded-xl font-bold">
                            </div>
                            <div id="url-field-container">
                                <label class="text-[10px] font-black uppercase opacity-50 block mb-1">Target URL</label>
                                <input id="edit-url" type="text" class="w-full p-3 bg-slate-100 rounded-xl">
                            </div>
                            <div>
                                <label class="text-[10px] font-black uppercase opacity-50 block mb-1">Image URL</label>
                                <input id="edit-img" type="text" class="w-full p-3 bg-slate-100 rounded-xl text-xs">
                            </div>
                        </div>
                        <div class="flex flex-col items-center justify-center bg-slate-50 rounded-3xl p-4">
                            <div class="w-24 h-24 bg-white rounded-2xl shadow-sm mb-4 flex items-center justify-center overflow-hidden">
                                <img id="edit-preview" src="" class="h-full object-contain transition-transform">
                            </div>
                            <label class="text-[10px] font-black uppercase opacity-50 mb-2">Zoom: <span id="zoom-val">1</span>x</label>
                            <input type="range" id="edit-zoom" min="0.5" max="3" step="0.1" value="1" class="w-full h-2 bg-blue-200 rounded-lg appearance-none">
                        </div>
                    </div>
                    <button id="btn-save-edit" class="w-full bg-blue-800 text-white p-5 rounded-2xl font-black uppercase tracking-widest shadow-xl mt-4">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Environment
        const fbConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : {};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'scout-links-default';
        const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        const app = initializeApp(fbConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // State
        let state = {
            isAdmin: false,
            isEditing: false,
            darkMode: false,
            links: [],
            settings: {
                title: 'Scout Resources',
                subtitle: 'Pack 505 • Troop 101',
                logo: 'https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png',
                logoZoom: 1
            }
        };

        let currentEditId = null; 
        let currentEditType = 'link'; // 'link' or 'header'

        // UI Helpers
        const el = (id) => document.getElementById(id);
        
        window.closeModals = () => {
            el('modal-overlay').classList.add('hidden');
            el('modal-overlay').classList.remove('flex');
        };

        const openModal = (type) => {
            el('modal-overlay').classList.remove('hidden');
            el('modal-overlay').classList.add('flex');
            el('modal-login').classList.toggle('hidden', type !== 'login');
            el('modal-edit').classList.toggle('hidden', type !== 'edit');
        };

        // Auth Logic
        const init = async () => {
            if (initialToken) await signInWithCustomToken(auth, initialToken);
            else await signInAnonymously(auth);
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'config');
                onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        state.links = data.links || [];
                        state.settings = data.settings || state.settings;
                        render();
                    }
                }, (err) => console.error("Firestore Error:", err));
            }
        });

        // Theme
        el('btn-theme').onclick = () => {
            state.darkMode = !state.darkMode;
            document.body.classList.toggle('dark', state.darkMode);
            document.body.classList.toggle('bg-slate-950', state.darkMode);
            document.body.classList.toggle('text-white', state.darkMode);
            el('icon-moon').innerHTML = state.darkMode 
                ? '<path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-11.314l.707.707m11.314 11.314l.707.707M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/>'
                : '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>';
        };

        // Admin Flow
        el('btn-admin-lock').onclick = () => {
            if (state.isAdmin) {
                state.isAdmin = false;
                state.isEditing = false;
                render();
            } else {
                openModal('login');
            }
        };

        el('btn-do-login').onclick = () => {
            if (el('admin-pass').value === 'scout123') {
                state.isAdmin = true;
                state.isEditing = true;
                closeModals();
                render();
            }
            el('admin-pass').value = '';
        };

        el('btn-toggle-edit').onclick = () => {
            state.isEditing = !state.isEditing;
            render();
        };

        // Render
        const render = () => {
            // Header
            el('display-title').innerText = state.settings.title;
            el('display-subtitle').innerText = state.settings.subtitle;
            el('display-logo').src = state.settings.logo;
            el('display-logo').style.transform = `scale(${state.settings.logoZoom})`;
            
            // Admin visibility
            el('btn-toggle-edit').classList.toggle('hidden', !state.isAdmin);
            el('btn-edit-header').classList.toggle('hidden', !state.isEditing);
            el('btn-toggle-edit').innerText = state.isEditing ? 'View Live' : 'Edit Mode';
            el('lock-icon').innerHTML = state.isAdmin 
                ? '<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/>'
                : '<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>';

            // Grid
            const grid = el('links-grid');
            grid.innerHTML = '';

            state.links.forEach(link => {
                const card = document.createElement('div');
                card.className = "group relative";
                card.innerHTML = `
                    ${state.isEditing ? `
                        <div class="absolute top-4 right-4 z-20 flex gap-2">
                            <button class="btn-edit-link p-2 bg-blue-600 text-white rounded-xl" data-id="${link.id}">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
                            </button>
                            <button class="btn-del-link p-2 bg-red-600 text-white rounded-xl" data-id="${link.id}">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                            </button>
                        </div>
                    ` : ''}
                    <a href="${state.isEditing ? '#' : link.url}" target="_blank" class="block aspect-square p-6 bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-xl border border-slate-100 dark:border-slate-800 transition-all hover:-translate-y-2 hover:shadow-2xl">
                        <div class="h-3/4 w-full bg-slate-50 dark:bg-slate-950 rounded-3xl mb-4 flex items-center justify-center overflow-hidden">
                            <img src="${link.img || ''}" style="transform: scale(${link.zoom || 1})" class="h-full object-contain">
                        </div>
                        <div class="text-center font-black uppercase tracking-widest text-sm opacity-80">${link.label}</div>
                    </a>
                `;
                grid.appendChild(card);
            });

            if (state.isEditing) {
                const addBtn = document.createElement('button');
                addBtn.className = "aspect-square rounded-[2.5rem] border-4 border-dashed border-slate-300 flex flex-col items-center justify-center text-slate-400 hover:border-blue-500 hover:text-blue-500 transition-all";
                addBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg><span class="font-black uppercase text-xs mt-2">Add New</span>`;
                addBtn.onclick = () => editLink(null);
                grid.appendChild(addBtn);
            }

            // Bind events
            document.querySelectorAll('.btn-edit-link').forEach(b => b.onclick = () => editLink(b.dataset.id));
            document.querySelectorAll('.btn-del-link').forEach(b => b.onclick = () => deleteLink(b.dataset.id));
        };

        // Editor Functions
        const editLink = (id) => {
            currentEditId = id;
            currentEditType = 'link';
            const link = state.links.find(l => l.id == id) || { label: '', url: 'https://', img: '', zoom: 1 };
            el('modal-title').innerText = id ? 'Edit Link' : 'Add New Link';
            el('url-field-container').classList.remove('hidden');
            el('edit-label').value = link.label;
            el('edit-url').value = link.url;
            el('edit-img').value = link.img;
            el('edit-zoom').value = link.zoom || 1;
            updatePreview();
            openModal('edit');
        };

        el('btn-edit-header').onclick = () => {
            currentEditType = 'header';
            el('modal-title').innerText = 'Header Settings';
            el('url-field-container').classList.add('hidden');
            el('edit-label').value = state.settings.title;
            el('edit-url').value = state.settings.subtitle; // Reusing field
            el('edit-img').value = state.settings.logo;
            el('edit-zoom').value = state.settings.logoZoom;
            updatePreview();
            openModal('edit');
        };

        const updatePreview = () => {
            el('edit-preview').src = el('edit-img').value;
            el('edit-preview').style.transform = `scale(${el('edit-zoom').value})`;
            el('zoom-val').innerText = el('edit-zoom').value;
        };

        el('edit-img').oninput = updatePreview;
        el('edit-zoom').oninput = updatePreview;

        el('btn-save-edit').onclick = async () => {
            if (currentEditType === 'link') {
                const updated = {
                    id: currentEditId || Date.now().toString(),
                    label: el('edit-label').value,
                    url: el('edit-url').value,
                    img: el('edit-img').value,
                    zoom: parseFloat(el('edit-zoom').value)
                };
                if (currentEditId) {
                    state.links = state.links.map(l => l.id == currentEditId ? updated : l);
                } else {
                    state.links.push(updated);
                }
            } else {
                state.settings = {
                    title: el('edit-label').value,
                    subtitle: el('edit-url').value,
                    logo: el('edit-img').value,
                    logoZoom: parseFloat(el('edit-zoom').value)
                };
            }
            await saveToFirebase();
            closeModals();
            render();
        };

        const deleteLink = async (id) => {
            state.links = state.links.filter(l => l.id != id);
            await saveToFirebase();
            render();
        };

        const saveToFirebase = async () => {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'config');
            await setDoc(docRef, {
                links: state.links,
                settings: state.settings,
                updatedAt: Date.now()
            });
        };

        init();
    </script>
</body>
</html>
