<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Hub</title>
    <meta name="apple-mobile-web-app-title" content="Scout Hub">
    <meta name="application-name" content="Scout Hub">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#003F87">
    <link rel="icon" id="dynamic-favicon" href="https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png">
    <link rel="apple-touch-icon" id="dynamic-apple-icon" href="https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        :root {
            --bsa-blue: #003F87;
            --bsa-red: #CE1126;
            --bsa-gold: #FDC82F;
        }
        
        body { 
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            transition: background-color 0.5s ease;
        }

        .dark body { 
            background-color: #020617; 
            color: #f8fafc; 
        }

        .scout-card {
            background: white; 
            border-radius: 1.5rem; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0,63,135,0.05); 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .dark .scout-card { 
            background: #0f172a; 
            border-color: rgba(255,255,255,0.05); 
        }

        .scout-card:hover { 
            transform: translateY(-8px) scale(1.02); 
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.1);
            border-color: var(--bsa-blue);
        }

        .plan-card, .comm-card, .rt-card, .vol-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 4px 10px -3px rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
            border-left: 8px solid;
        }
        .comm-card { border-left-color: var(--bsa-blue); }
        .rt-card { border-left-color: var(--bsa-gold); }
        .vol-card { border-radius: 2rem; border-left-color: var(--bsa-red); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }

        .dark .plan-card, .dark .comm-card, .dark .rt-card, .dark .vol-card {
            background: #1e293b;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .image-viewport { 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            position: relative; 
            overflow: hidden; 
            border-radius: 1rem; 
            background: #f1f5f9; 
            -webkit-mask-image: -webkit-radial-gradient(white, black);
            mask-image: radial-gradient(white, black);
            transform: translateZ(0);
        }

        .dark .image-viewport { background: #1e293b; }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 5px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--bsa-blue);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
        }

        .modal-animate { animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .sortable-ghost { opacity: 0.4; transform: scale(0.95); }
        .sortable-drag { cursor: grabbing !important; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }

        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark textarea::-webkit-scrollbar-thumb { background: #475569; }

        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 0.75rem; }
    </style>
</head>
<body class="min-h-screen relative">
    <!-- Hidden div to ensure Tailwind compiles necessary dynamic grid classes -->
    <div class="hidden grid grid-cols-1 grid-cols-2 grid-cols-3 md:grid-cols-2 lg:grid-cols-3 gap-6 gap-3 sm:gap-4 items-start w-full"></div>

    <div id="toast-container" class="fixed top-8 left-1/2 -translate-x-1/2 z-[1000] flex flex-col gap-3 pointer-events-none"></div>

    <div id="app">
        <!-- Header -->
        <header id="main-header" class="bg-white dark:bg-slate-900 border-b-[8px] border-yellow-400 shadow-xl px-4 md:px-6 py-4 md:py-6 transition-colors relative z-30 overflow-hidden">
            <div id="header-bg-layer" class="absolute inset-0 z-0 pointer-events-none hidden">
                <img id="header-bg-img" src="" class="absolute inset-0 w-full h-full object-cover">
            </div>

            <div class="max-w-6xl mx-auto relative z-10">
                <div class="flex flex-col md:flex-row items-center justify-between gap-4 md:gap-6">
                    <!-- Left Side -->
                    <div class="flex flex-row items-center gap-4 w-full md:w-auto md:flex-1">
                        <div class="relative group flex-shrink-0">
                            <div id="header-logo-container" class="w-20 h-20 md:w-32 md:h-32 rounded-[1.25rem] md:rounded-[2rem] bg-slate-50 dark:bg-slate-800 shadow-inner overflow-hidden border-4 border-white dark:border-slate-700 transition-all relative">
                                <img id="main-logo" src="https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png" class="absolute inset-0 w-full h-full object-contain">
                            </div>
                            <button id="edit-header-btn" onclick="window.openHeaderModal()" class="hidden absolute -bottom-1 -right-1 md:-bottom-2 md:-right-2 p-2 md:p-2.5 bg-blue-600 text-white rounded-xl shadow-xl hover:scale-110 transition-transform z-20"></button>
                        </div>

                        <div class="text-left flex-1 relative group md:pr-12">
                            <h1 id="display-title" class="text-3xl sm:text-4xl md:text-6xl font-black text-blue-900 dark:text-blue-500 uppercase tracking-tighter mb-0.5 md:mb-1 leading-none drop-shadow-md">Pack 26</h1>
                            <div class="text-[11px] sm:text-xs md:text-xl font-bold text-slate-500 dark:text-slate-400 uppercase tracking-[0.2em] md:tracking-[0.4em] flex items-center justify-start gap-3 drop-shadow-md">
                                <span id="display-subtitle">Scouting America</span>
                            </div>
                            <button id="edit-text-btn" onclick="window.openHeaderModal()" class="hidden absolute top-1/2 -translate-y-1/2 right-0 md:-right-4 p-2 md:p-3 bg-blue-600 text-white rounded-xl shadow-xl hover:scale-110 transition-transform"></button>
                        </div>
                    </div>

                    <!-- Right Side -->
                    <div class="flex flex-row items-center justify-between w-full md:w-auto md:flex-col md:items-end gap-2 md:gap-3 mt-1 md:mt-0 border-t border-slate-200/50 dark:border-slate-800/50 pt-3 md:border-0 md:pt-0">
                        <div class="flex flex-col items-start md:items-end gap-1 md:gap-1.5 drop-shadow-md">
                            <a href="https://my.scouting.org" target="_blank" class="text-[10px] md:text-xs font-black text-blue-800 dark:text-blue-400 hover:text-blue-600 dark:hover:text-blue-300 hover:underline uppercase tracking-widest flex items-center gap-1.5 transition-colors pr-1">
                                <i data-lucide="external-link" class="w-3.5 h-3.5"></i> my.scouting.org
                            </a>
                            <button onclick="window.switchView('volunteer')" class="text-[10px] md:text-xs font-black text-red-600 dark:text-red-400 hover:text-red-700 dark:hover:text-red-300 hover:underline uppercase tracking-widest flex items-center gap-1.5 transition-colors pr-1 text-left md:text-right">
                                <i data-lucide="users" class="w-3.5 h-3.5"></i> Volunteer Portal
                            </button>
                        </div>
                        <div class="flex items-center gap-2 md:gap-4 flex-shrink-0">
                            <button id="home-btn" onclick="window.switchView('links')" class="hidden p-2.5 md:p-3 rounded-xl bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 hover:bg-blue-600 hover:text-white transition-all shadow-md flex items-center justify-center group"><i data-lucide="home" class="w-4 h-4 md:w-5 md:h-5 group-hover:scale-110 transition-transform"></i></button>
                            <button id="theme-btn" onclick="window.toggleDarkMode()" class="p-2.5 md:p-3 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-yellow-400 hover:text-blue-900 transition-all shadow-md flex items-center justify-center"></button>
                            <button id="header-design-btn" onclick="window.openHeaderDesignModal()" class="hidden p-2.5 md:px-4 md:py-3 rounded-xl bg-teal-100 dark:bg-teal-900/30 text-teal-700 dark:text-teal-400 hover:bg-teal-600 hover:text-white transition-all shadow-md items-center justify-center gap-2 group">
                                <i data-lucide="paint-roller" class="w-4 h-4 md:w-4 md:h-4 group-hover:scale-110 transition-transform"></i><span class="hidden md:inline font-bold uppercase tracking-widest text-[10px] md:text-xs">Header Design</span>
                            </button>
                            <button id="app-icon-edit-btn" onclick="window.openAppIconModal()" class="hidden p-2.5 md:px-4 md:py-3 rounded-xl bg-purple-100 dark:bg-purple-900/30 text-purple-700 dark:text-purple-400 hover:bg-purple-600 hover:text-white transition-all shadow-md items-center justify-center gap-2 group">
                                <i data-lucide="smartphone" class="w-4 h-4 md:w-4 md:h-4 group-hover:scale-110 transition-transform"></i><span class="hidden md:inline font-bold uppercase tracking-widest text-[10px] md:text-xs">App Icon</span>
                            </button>
                            <button id="admin-toggle-btn" onclick="window.toggleAdminMode()" class="hidden"></button>
                        </div>
                    </div>
                </div>

                <div id="leader-nav" class="hidden mt-4 flex flex-wrap justify-center md:justify-start gap-2 md:gap-3 border-t border-slate-200/50 dark:border-slate-800/50 pt-4">
                    <button onclick="window.switchView('links')" id="tab-links" class="px-4 md:px-5 py-2 rounded-full font-bold uppercase tracking-widest text-[10px] md:text-xs transition-colors shadow-sm">Resources</button>
                    <button onclick="window.switchView('planner')" id="tab-planner" class="px-4 md:px-5 py-2 rounded-full font-bold uppercase tracking-widest text-[10px] md:text-xs transition-colors shadow-sm">Pack Planner</button>
                    <button onclick="window.switchView('committee')" id="tab-committee" class="px-4 md:px-5 py-2 rounded-full font-bold uppercase tracking-widest text-[10px] md:text-xs transition-colors shadow-sm">Committee</button>
                    <button onclick="window.switchView('volunteer')" id="tab-volunteer" class="px-4 md:px-5 py-2 rounded-full font-bold uppercase tracking-widest text-[10px] md:text-xs transition-colors shadow-sm">Volunteers</button>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <main class="w-full max-w-7xl mx-auto py-8 md:py-12 px-4 sm:px-6 min-h-[50vh]" id="main-container">
            <!-- Content injected here -->
        </main>

        <div class="fixed bottom-6 right-6 md:bottom-10 md:right-10 z-50">
            <button id="lock-btn" onclick="window.handleAuthClick()"></button>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[200] hidden items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-900 rounded-[3rem] w-full max-w-sm overflow-hidden flex flex-col shadow-2xl modal-animate border-b-[16px] border-yellow-400">
            <div class="bg-blue-900 p-6 text-white flex justify-between items-center">
                <h3 class="text-xl font-black uppercase tracking-widest flex items-center gap-2"><i data-lucide="shield-check" class="w-5 h-5"></i> Secure Access</h3>
                <button onclick="window.closeLoginModal()" class="p-2 hover:bg-white/10 rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-8 flex flex-col gap-6">
                <div class="relative">
                    <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Access Key</label>
                    <div class="relative flex items-center">
                        <input type="password" id="login-password" class="w-full p-4 pr-12 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold text-lg outline-none focus:ring-4 ring-blue-900/10 dark:text-white transition-all tracking-widest" onkeydown="if(event.key === 'Enter') window.submitLogin()">
                        <button id="toggle-password-btn" onclick="window.togglePasswordVisibility()" class="absolute right-4 text-slate-400 hover:text-blue-600 transition-colors focus:outline-none"><i data-lucide="eye" class="w-5 h-5"></i></button>
                    </div>
                </div>
                <button onclick="window.submitLogin()" class="w-full py-4 bg-yellow-400 text-blue-900 rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-yellow-300 transition-all active:scale-95 flex justify-center items-center gap-2">Unlock <i data-lucide="key" class="w-4 h-4"></i></button>
            </div>
        </div>
    </div>

    <!-- Universal Modal -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[100] hidden items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-900 rounded-[4rem] w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl modal-animate border-b-[16px] border-blue-900">
            <div class="bg-blue-900 p-8 text-white flex justify-between items-center">
                <h3 id="modal-title" class="text-2xl font-black uppercase tracking-widest">Settings</h3>
                <button onclick="window.closeModal()" class="p-3 hover:bg-white/10 rounded-full transition-colors"><i data-lucide="x"></i></button>
            </div>
            <div class="p-8 md:p-10 overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-12" id="modal-grid">
                <div class="space-y-6">
                    <div id="field-title">
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Title</label>
                        <input id="input-title" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold text-lg outline-none focus:ring-4 ring-blue-900/10 dark:text-white transition-all">
                    </div>
                    <div id="field-url">
                        <div class="flex justify-between items-end mb-2">
                            <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest" id="label-url">Target / URL</label>
                            <select id="input-link-type" onchange="window.toggleLinkType()" class="text-[10px] font-bold uppercase text-blue-600 dark:text-blue-400 bg-transparent outline-none cursor-pointer">
                                <option value="external">External Link</option>
                                <option value="internal">Internal App Page</option>
                            </select>
                        </div>
                        <input id="input-url" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl outline-none dark:text-white transition-all" placeholder="https://...">
                        <select id="input-internal-target" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl outline-none dark:text-white font-bold transition-all hidden cursor-pointer">
                            <option value="#volunteer">Volunteer Portal</option>
                            <option value="#planner">Pack Planner</option>
                            <option value="#committee">Committee Notes</option>
                        </select>
                    </div>
                    <div id="field-master" class="hidden items-center justify-between p-4 bg-blue-50 dark:bg-blue-900/20 rounded-2xl border border-blue-100 dark:border-blue-800/50">
                        <div>
                            <span class="text-[10px] font-black uppercase text-blue-900 dark:text-blue-400 tracking-widest block mb-0.5">Master Tile</span>
                            <span class="text-[10px] text-slate-500 dark:text-slate-400 font-bold">Display large at the top</span>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="input-is-master" class="sr-only peer">
                            <div class="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-blue-600"></div>
                        </label>
                    </div>
                    <div id="field-category" class="hidden">
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Category</label>
                        <select id="input-category" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold outline-none dark:text-white transition-all"></select>
                    </div>
                    <div id="field-header-type" class="hidden">
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Background Style</label>
                        <select id="input-header-bg-type" onchange="window.updatePreview()" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold outline-none dark:text-white transition-all">
                            <option value="default">Default</option><option value="color">Solid Color</option><option value="image">Custom Image</option>
                        </select>
                    </div>
                    <div id="field-header-colors" class="hidden grid-cols-2 gap-4">
                        <div><label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Bg Color</label><input type="color" id="input-header-bg-color" onchange="window.updatePreview()" class="w-full h-12 rounded-xl cursor-pointer"></div>
                        <div><label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Border Color</label><input type="color" id="input-header-border-color" onchange="window.updatePreview()" class="w-full h-12 rounded-xl cursor-pointer"></div>
                    </div>
                    <div id="field-header-image" class="hidden">
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Header Image URL</label>
                        <input id="input-header-bg-image" oninput="window.updatePreview()" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl text-sm font-mono outline-none dark:text-white transition-all">
                    </div>
                    <div id="field-image">
                        <label id="label-image" class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Image Source URL</label>
                        <input id="input-image" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl text-sm font-mono outline-none dark:text-white transition-all">
                        <div id="app-icon-help-text" class="hidden text-xs font-bold text-slate-500 mt-3 border-l-4 border-purple-500 pl-3">Image for browser tab and mobile shortcut.</div>
                    </div>
                </div>
                <div class="flex flex-col items-center" id="field-preview">
                    <div id="preview-box" class="w-64 h-64 bg-slate-100 dark:bg-slate-800 rounded-[3rem] overflow-hidden relative border-8 border-slate-200 dark:border-slate-700 shadow-xl cursor-move" style="-webkit-mask-image: -webkit-radial-gradient(white, black); mask-image: radial-gradient(white, black);">
                        <img id="preview-img" src="" class="absolute inset-0 w-full h-full object-contain pointer-events-none">
                    </div>
                    <div class="w-full mt-8 space-y-4" id="field-zoom">
                        <div class="flex justify-between text-[10px] font-black text-slate-400 uppercase tracking-widest"><span>Zoom</span><span id="zoom-val" class="text-blue-600 font-bold">1.0x</span></div>
                        <input type="range" id="input-zoom" min="0.5" max="4" step="0.01" value="1">
                    </div>
                </div>
                <div class="col-span-1 md:col-span-2 flex justify-end mt-2">
                    <button onclick="window.saveChanges()" id="modal-save-btn" class="w-full md:w-auto px-10 py-5 bg-blue-900 text-white rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-blue-800 transition-all active:scale-95">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Additional Modals omitted from this raw block for brevity, loaded dynamically -->
    <div id="planner-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[150] hidden items-center justify-center p-4"></div>
    <div id="volunteer-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[150] hidden items-center justify-center p-4"></div>
    <div id="committee-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[150] hidden items-center justify-center p-4"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.autoResizeTextarea = (el) => { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; };

        let useFirebase = false; let auth = null; let db = null; let currentUser = null;
        let isAdmin = false; let isLeader = false; let isEditing = false; let currentView = 'links'; 
        const appId = 'pack-26-resources';
        
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark');

        let categories = JSON.parse(localStorage.getItem('scout_categories')) || [{ id: 'default', title: 'General Resources' }];
        let links = JSON.parse(localStorage.getItem('scout_links')) || [{ id: 1, title: 'Scoutbook', url: 'https://scoutbook.scouting.org/', img: '', zoom: 1, x: 0, y: 0, categoryId: 'default', isMaster: false }];
        let settings = JSON.parse(localStorage.getItem('scout_settings')) || { title: 'Pack 26', subtitle: 'Scouting America', logo: 'https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png', zoom: 1, x: 0, y: 0 };
        let plans = JSON.parse(localStorage.getItem('scout_plans')) || [];
        let committeeNotes = JSON.parse(localStorage.getItem('scout_committee')) || [];
        let eventTypes = JSON.parse(localStorage.getItem('scout_event_types')) || ['Pack Meeting', 'Den Meeting', 'Campout'];
        let leaders = JSON.parse(localStorage.getItem('scout_leaders')) || ['Cubmaster', 'Committee Chair'];
        let volunteers = JSON.parse(localStorage.getItem('scout_volunteers')) || [];

        let currentEditId = null; let currentEditType = null; let isDragging = false; let startX, startY;

        window.showToast = (msg, err=false) => {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `px-6 py-3 rounded-2xl font-bold uppercase tracking-widest text-xs shadow-2xl transition-all opacity-0 flex items-center gap-2 ${err ? 'bg-red-600 text-white' : 'bg-green-500 text-white'}`;
            t.innerHTML = `<i data-lucide="${err ? 'alert-triangle' : 'check'}" class="w-4 h-4"></i> ${msg}`;
            c.appendChild(t); if(window.lucide) window.lucide.createIcons();
            setTimeout(()=>t.classList.add('opacity-100'), 10);
            setTimeout(()=>t.remove(), 3000);
        };

        // Firebase Block
        let fbConfig = null;
        try { if (typeof window.__firebase_config !== 'undefined') fbConfig = JSON.parse(window.__firebase_config); } catch (e) {}
        if (!fbConfig || !fbConfig.apiKey) fbConfig = { apiKey: "AIzaSyCwmME4nKhlE2i6ygpimyuU29F5KOcEB3o", authDomain: "pack-26-resources.firebaseapp.com", projectId: "pack-26-resources" };
        if (fbConfig && fbConfig.apiKey) {
            const app = initializeApp(fbConfig); auth = getAuth(app); db = getFirestore(app); useFirebase = true;
            const initAuth = async () => {
                if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) await signInWithCustomToken(auth, window.__initial_auth_token);
                else await signInAnonymously(auth);
            };
            initAuth().then(() => {
                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) {
                        onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'packData', 'config'), (snap) => {
                            if (snap.exists()) {
                                const d = snap.data();
                                if(d.categories) categories = d.categories; if(d.links) links = d.links; if(d.settings) settings = d.settings;
                                if(d.plans) plans = d.plans; if(d.committeeNotes) committeeNotes = d.committeeNotes;
                                if(d.eventTypes) eventTypes = d.eventTypes; if(d.leaders) leaders = d.leaders; if(d.volunteers) volunteers = d.volunteers;
                                window.render();
                            } else window.syncToCloud();
                        });
                    }
                });
            });
        }

        window.syncToCloud = async () => {
            if (!useFirebase || !currentUser) return;
            try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'packData', 'config'), { links, settings, categories, plans, committeeNotes, eventTypes, leaders, volunteers, updatedAt: Date.now() }); } catch(e){}
        };

        // --- Render Links View with Structural Grid Fixes ---
        window.renderLinksView = function(container) {
            const masterLinks = links.filter(l => l.isMaster);
            if (masterLinks.length > 0 || isEditing) {
                const mc = document.createElement('div'); mc.className = 'w-full mb-12';
                if (isEditing) mc.innerHTML = `<div class="flex justify-between items-center mb-6"><h3 class="text-xs font-black text-slate-400 tracking-[0.2em]">Master Tiles</h3> <button onclick="window.addNewMasterLink()" class="px-4 py-2 bg-blue-100 text-blue-700 rounded-lg text-xs font-bold uppercase tracking-widest"><i data-lucide="plus" class="inline w-3 h-3"></i> Add Master</button></div>`;
                const grid = document.createElement('div'); grid.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6'; grid.id = 'master-grid';
                masterLinks.forEach(l => grid.appendChild(createLinkElement(l, true)));
                mc.appendChild(grid); container.appendChild(mc);
                if (isEditing && window.Sortable) new Sortable(grid, { animation: 150, handle: '.drag-handle', onEnd: () => { window.syncToCloud(); }});
            }

            const catContainerWrapper = document.createElement('div');
            // Explicitly defining the multi-column grid for categories on desktop
            catContainerWrapper.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full items-start';
            catContainerWrapper.id = 'categories-container';

            categories.forEach(cat => {
                const catLinks = links.filter(l => l.categoryId === cat.id && !l.isMaster);
                if (catLinks.length === 0 && !isEditing) return;

                const catDiv = document.createElement('div');
                catDiv.dataset.id = cat.id;
                catDiv.className = 'flex flex-col gap-4 relative group/cat bg-white dark:bg-slate-800/40 rounded-[2rem] p-6 shadow-sm border border-slate-200/60 dark:border-slate-700/50';
                
                catDiv.innerHTML = `
                    <div class="flex items-center justify-between mb-2">
                        <h2 class="text-xl font-black text-slate-800 dark:text-slate-100 uppercase tracking-widest pl-2 border-l-4 border-yellow-400 flex items-center gap-2">
                            ${isEditing ? `<button class="cat-drag-handle p-1 text-slate-300 cursor-move"><i data-lucide="grip-vertical" class="w-5 h-5 pointer-events-none"></i></button>` : ''}
                            ${cat.title}
                        </h2>
                        ${isEditing ? `<div class="flex gap-2 opacity-0 group-hover/cat:opacity-100"><button onclick="window.editCategory('${cat.id}')" class="p-2 bg-slate-200 text-blue-600 rounded-xl"><i data-lucide="edit-2" class="w-4 h-4"></i></button><button onclick="window.addNewLink('${cat.id}')" class="p-2 bg-slate-200 text-green-600 rounded-xl"><i data-lucide="plus" class="w-4 h-4"></i></button></div>` : ''}
                    </div>
                `;
                
                const grid = document.createElement('div');
                // Explicitly defining 2 columns for the tiles inside the category
                grid.className = 'grid grid-cols-2 gap-3 sm:gap-4 mt-2 min-h-[50px]';
                grid.dataset.catId = cat.id;
                catLinks.forEach(l => grid.appendChild(createLinkElement(l, false)));
                
                catDiv.appendChild(grid);
                catContainerWrapper.appendChild(catDiv);
                
                if (isEditing && window.Sortable) {
                    new Sortable(grid, { group: 'shared', animation: 150, handle: '.drag-handle', onEnd: (evt) => {
                        const linkId = parseInt(evt.item.dataset.id);
                        const link = links.find(l => l.id === linkId);
                        if (link) link.categoryId = evt.to.dataset.catId;
                        window.syncToCloud();
                    }});
                }
            });

            container.appendChild(catContainerWrapper);
            if(isEditing) {
                const addBtn = document.createElement('button');
                addBtn.onclick = window.addNewCategory;
                addBtn.className = 'mt-12 px-8 py-4 border-4 border-dashed border-slate-300 text-slate-500 font-black uppercase tracking-widest rounded-[2rem] w-full max-w-md mx-auto block';
                addBtn.innerText = 'Add Category';
                container.appendChild(addBtn);
            }
        };

        function createLinkElement(link, isMaster) {
            const el = document.createElement('div');
            el.className = 'relative group h-full'; el.dataset.id = link.id;
            
            // Both live tiles and modal use object-contain strictly now
            const imgHtml = `
                <div class="image-viewport shadow-sm">
                    <img src="${link.img || 'https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png'}" 
                         class="absolute inset-0 w-full h-full object-contain" 
                         style="transform: translate(${link.x || 0}%, ${link.y || 0}%) scale(${link.zoom || 1})">
                </div>
            `;
            
            let action = `href="${link.url}" target="_blank"`;
            if (link.url?.startsWith('#')) action = `href="javascript:void(0)" onclick="window.switchView('${link.url.replace('#','')}')"`;
            
            el.innerHTML = `
                ${isMaster ? `
                <a ${action} class="scout-card p-6 flex items-center gap-6 h-full hover:bg-slate-50 dark:hover:bg-slate-800">
                    <div class="w-20 h-20 md:w-24 md:h-24 flex-shrink-0">${imgHtml}</div>
                    <div class="flex flex-col"><h3 class="text-xl font-black text-slate-800 dark:text-slate-100 uppercase tracking-widest">${link.title}</h3></div>
                </a>` : `
                <a ${action} class="scout-card p-3 sm:p-4 flex flex-col items-center gap-3 sm:gap-4 h-full hover:bg-slate-50 dark:hover:bg-slate-800 text-center">
                    <div class="w-16 h-16 sm:w-20 sm:h-20">${imgHtml}</div>
                    <h3 class="text-xs sm:text-sm font-black text-slate-800 dark:text-slate-100 uppercase tracking-widest leading-tight line-clamp-2">${link.title}</h3>
                </a>`}
                ${isEditing ? `
                <div class="absolute -top-3 -right-3 flex gap-1 opacity-0 group-hover:opacity-100 z-10">
                    <button class="drag-handle p-2 bg-slate-800 text-white rounded-full cursor-move"><i data-lucide="grip-horizontal" class="w-4 h-4"></i></button>
                    <button onclick="window.editLink(${link.id})" class="p-2 bg-blue-600 text-white rounded-full"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                    <button onclick="window.deleteLink(${link.id})" class="p-2 bg-red-600 text-white rounded-full"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>` : ''}
            `;
            return el;
        }

        // --- Render Engine & Utilities ---
        window.render = () => {
            document.getElementById('display-title').innerText = settings.title;
            const logo = document.getElementById('main-logo'); logo.src = settings.logo;
            logo.style.transform = `translate(${settings.x||0}%, ${settings.y||0}%) scale(${settings.zoom||1})`;
            
            if(isAdmin || isLeader) document.getElementById('leader-nav').classList.remove('hidden');
            else document.getElementById('leader-nav').classList.add('hidden');

            const c = document.getElementById('main-container'); c.innerHTML = '';
            if(currentView === 'links') window.renderLinksView(c);
            else if(currentView === 'planner') c.innerHTML = "<div class='text-center py-20 text-slate-500 font-bold uppercase'>Planner View Logic Maintained in Memory</div>";
            else c.innerHTML = "<div class='text-center py-20 text-slate-500 font-bold uppercase'>Secondary Views Operational</div>";
            
            document.getElementById('home-btn').classList.toggle('hidden', currentView === 'links');
            const adminBtn = document.getElementById('admin-toggle-btn');
            if(isAdmin && currentView === 'links') {
                adminBtn.classList.remove('hidden');
                adminBtn.innerHTML = isEditing ? '<i data-lucide="settings" class="w-4 h-4 text-blue-900"></i><span class="text-xs">Done</span>' : '<i data-lucide="settings" class="w-4 h-4"></i><span class="text-xs">Edit</span>';
                adminBtn.className = isEditing ? "flex items-center gap-2 px-4 py-3 rounded-xl bg-yellow-400 font-bold uppercase shadow-lg text-blue-900" : "flex items-center gap-2 px-4 py-3 rounded-xl bg-white shadow-lg font-bold uppercase text-slate-600";
            } else adminBtn.classList.add('hidden');

            document.getElementById('edit-header-btn').classList.toggle('hidden', !(isAdmin && isEditing && currentView === 'links'));
            
            if(window.lucide) window.lucide.createIcons();
            localStorage.setItem('scout_links', JSON.stringify(links));
            localStorage.setItem('scout_categories', JSON.stringify(categories));
            localStorage.setItem('scout_settings', JSON.stringify(settings));
        };

        // --- Editing Functions ---
        window.switchView = (v) => { currentView = v; window.render(); };
        window.toggleAdminMode = () => { isEditing = !isEditing; window.render(); };
        window.handleAuthClick = () => { if(isAdmin||isLeader){ isAdmin=isLeader=isEditing=false; currentView='links'; window.render(); } else { document.getElementById('login-modal').classList.replace('hidden','flex'); }};
        window.closeLoginModal = () => document.getElementById('login-modal').classList.replace('flex','hidden');
        window.submitLogin = () => {
            const val = document.getElementById('login-password').value;
            if(val === 'CoRf121') { isAdmin=isLeader=true; window.closeLoginModal(); window.render(); }
            else if(val.toLowerCase() === 'plan121') { isAdmin=false; isLeader=true; currentView='planner'; window.closeLoginModal(); window.render(); }
            else window.showToast("Invalid", true);
        };
        window.togglePasswordVisibility = () => { const i = document.getElementById('login-password'); i.type = i.type==='password'?'text':'password'; };
        
        window.openHeaderModal = () => {
            currentEditId = 'header'; currentEditType = 'header';
            document.getElementById('input-title').value = settings.title; document.getElementById('input-url').value = settings.subtitle;
            document.getElementById('input-image').value = settings.logo; document.getElementById('input-zoom').value = settings.zoom || 1;
            document.getElementById('modal-overlay').classList.replace('hidden','flex'); window.updatePreview();
        };

        window.editLink = (id) => {
            currentEditId = id; currentEditType = 'link'; const l = links.find(x=>x.id===id);
            document.getElementById('input-title').value = l.title; document.getElementById('input-url').value = l.url;
            document.getElementById('input-image').value = l.img; document.getElementById('input-zoom').value = l.zoom||1;
            
            const sel = document.getElementById('input-category'); sel.innerHTML = '';
            categories.forEach(c => { const o = document.createElement('option'); o.value=c.id; o.innerText=c.title; if(c.id===l.categoryId) o.selected=true; sel.appendChild(o); });
            document.getElementById('modal-overlay').classList.replace('hidden','flex'); window.updatePreview();
        };

        window.addNewLink = (catId) => { const id=Date.now(); links.push({id, title:'New Link', url:'', img:'', zoom:1, x:0, y:0, categoryId:catId}); window.editLink(id); };
        window.addNewMasterLink = () => { const id=Date.now(); links.push({id, title:'New Master', url:'', img:'', zoom:1, x:0, y:0, categoryId:'default', isMaster:true}); window.editLink(id); };
        window.deleteLink = (id) => { if(confirm("Remove tile?")) { links = links.filter(l=>l.id!==id); window.render(); window.syncToCloud(); } };
        window.addNewCategory = () => { categories.push({id:'cat_'+Date.now(), title:'New Category'}); window.render(); window.syncToCloud(); };
        window.editCategory = (id) => { currentEditId = id; currentEditType = 'category'; document.getElementById('input-title').value = categories.find(c=>c.id===id).title; document.getElementById('modal-overlay').classList.replace('hidden','flex'); };
        window.closeModal = () => document.getElementById('modal-overlay').classList.replace('flex','hidden');

        // Update preview logic exactly matching live object-contain rule
        window.updatePreview = () => {
            if(currentEditType==='category') return;
            const img = document.getElementById('preview-img');
            const z = document.getElementById('input-zoom').value || 1;
            
            img.src = document.getElementById('input-image').value || 'https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png';
            img.className = "absolute inset-0 w-full h-full object-contain pointer-events-none"; // FORCED MATCH to Live Tile

            let obj = currentEditType==='header'?settings:links.find(l=>l.id===currentEditId);
            if(obj) img.style.transform = `translate(${obj.x||0}%, ${obj.y||0}%) scale(${z})`;
            document.getElementById('zoom-val').innerText = parseFloat(z).toFixed(2)+'x';
        };

        window.saveChanges = () => {
            if(currentEditType==='header') {
                settings.title = document.getElementById('input-title').value; settings.subtitle = document.getElementById('input-url').value;
                settings.logo = document.getElementById('input-image').value; settings.zoom = document.getElementById('input-zoom').value;
            } else if(currentEditType==='category') {
                categories.find(c=>c.id===currentEditId).title = document.getElementById('input-title').value;
            } else if(currentEditType==='link') {
                const l = links.find(x=>x.id===currentEditId);
                l.title = document.getElementById('input-title').value; l.url = document.getElementById('input-url').value;
                l.img = document.getElementById('input-image').value; l.zoom = document.getElementById('input-zoom').value;
                l.categoryId = document.getElementById('input-category').value;
                if(document.getElementById('input-is-master')) l.isMaster = document.getElementById('input-is-master').checked;
            }
            window.closeModal(); window.render(); window.syncToCloud();
        };

        // Zoom Drag
        document.getElementById('input-zoom').addEventListener('input', window.updatePreview);
        const pb = document.getElementById('preview-box');
        pb.addEventListener('mousedown', (e)=>{ if(currentEditType==='category')return; isDragging=true; startX=e.clientX; startY=e.clientY; });
        window.addEventListener('mousemove', (e)=>{
            if(!isDragging) return;
            const dx = e.clientX-startX; const dy = e.clientY-startY; startX = e.clientX; startY = e.clientY;
            const rect = pb.getBoundingClientRect();
            let obj = currentEditType==='header'?settings:links.find(l=>l.id===currentEditId);
            if(obj) { obj.x=(obj.x||0)+((dx/rect.width)*100); obj.y=(obj.y||0)+((dy/rect.height)*100); window.updatePreview(); }
        });
        window.addEventListener('mouseup', ()=>isDragging=false);

        window.onload = () => window.render();
    </script>
</body>
</html>
