<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Links Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bsa-blue: #003F87;
            --bsa-red: #CE1126;
            --bsa-gold: #FDC82F;
        }
        
        body { 
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            transition: background-color 0.5s ease;
        }

        .dark body { 
            background-color: #020617; 
            color: #f8fafc; 
        }

        .scout-card {
            background: white; 
            border-radius: 2.5rem; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0,63,135,0.05); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .dark .scout-card { 
            background: #0f172a; 
            border-color: rgba(255,255,255,0.05); 
        }

        .scout-card:hover { 
            transform: translateY(-12px) scale(1.02); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border-color: var(--bsa-blue);
        }

        .image-viewport { 
            width: 100%; 
            height: 180px; 
            position: relative; 
            overflow: hidden; 
            border-radius: 2rem; 
            background: #f1f5f9; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .dark .image-viewport { background: #1e293b; }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 5px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--bsa-blue);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
        }

        .modal-animate {
            animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen">
    <div id="app">
        <!-- Header -->
        <header class="bg-white dark:bg-slate-900 border-b-[12px] border-yellow-400 shadow-2xl px-6 py-12 transition-colors">
            <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-10">
                <div class="relative group">
                    <div id="header-logo-container" class="w-44 h-44 rounded-[3rem] bg-slate-50 dark:bg-slate-800 shadow-inner flex items-center justify-center overflow-hidden border-8 border-white dark:border-slate-700 transition-all">
                        <img id="main-logo" src="https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png" class="max-w-none h-full object-contain">
                    </div>
                    <button id="edit-header-btn" onclick="window.openHeaderModal()" class="hidden absolute -bottom-3 -right-3 p-3 bg-blue-600 text-white rounded-xl shadow-xl hover:scale-110 transition-transform">
                        <!-- Icon injected by render() -->
                    </button>
                </div>

                <div class="text-center md:text-left flex-1">
                    <h1 id="display-title" class="text-6xl md:text-8xl font-black text-blue-900 dark:text-blue-500 uppercase tracking-tighter mb-2 leading-none">
                        Pack 121
                    </h1>
                    <div class="text-xl font-bold text-slate-400 dark:text-slate-500 uppercase tracking-[0.4em] flex items-center justify-center md:justify-start gap-3">
                        <i data-lucide="star" class="text-yellow-500 fill-yellow-500 w-5 h-5"></i>
                        <span id="display-subtitle">Scouting America</span>
                    </div>
                </div>

                <div class="flex gap-4">
                    <button id="theme-btn" onclick="window.toggleDarkMode()" class="p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-yellow-400 hover:text-blue-900 transition-all shadow-md flex items-center justify-center">
                        <!-- Icon injected by render() -->
                    </button>
                    <button id="admin-toggle-btn" onclick="window.toggleAdminMode()" class="hidden">
                        <!-- Content injected by render() -->
                    </button>
                </div>
            </div>
        </header>

        <!-- Grid -->
        <main class="max-w-7xl mx-auto py-20 px-6">
            <div id="links-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <!-- Links injected here -->
            </div>
        </main>

        <!-- Auth & Footer -->
        <div class="fixed bottom-10 right-10 z-50">
            <button id="lock-btn" onclick="window.handleAuthClick()">
                <!-- Icon injected by render() -->
            </button>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[100] hidden items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-900 rounded-[4rem] w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl modal-animate border-b-[16px] border-blue-900">
            <div class="bg-blue-900 p-8 text-white flex justify-between items-center">
                <h3 id="modal-title" class="text-2xl font-black uppercase tracking-widest">Tile Settings</h3>
                <button onclick="window.closeModal()" class="p-3 hover:bg-white/10 rounded-full transition-colors"><i data-lucide="x"></i></button>
            </div>
            
            <div class="p-8 md:p-10 overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-12">
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Title</label>
                        <input id="input-title" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold text-lg outline-none focus:ring-4 ring-blue-900/10 dark:text-white transition-all">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest" id="label-url">URL</label>
                        <input id="input-url" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl outline-none dark:text-white transition-all" placeholder="https://...">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Image Source URL</label>
                        <input id="input-image" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl text-sm font-mono outline-none dark:text-white transition-all">
                    </div>
                </div>

                <div class="flex flex-col items-center">
                    <div id="preview-box" class="w-64 h-64 bg-slate-100 dark:bg-slate-800 rounded-[3rem] overflow-hidden relative border-8 border-slate-200 dark:border-slate-700 shadow-xl cursor-move active:cursor-grabbing">
                        <img id="preview-img" src="" class="max-w-none h-full object-contain pointer-events-none">
                    </div>
                    <div class="w-full mt-8 space-y-4">
                        <div class="flex justify-between text-[10px] font-black text-slate-400 uppercase tracking-widest">
                            <span>Zoom</span>
                            <span id="zoom-val" class="text-blue-600 font-bold">1.0x</span>
                        </div>
                        <input type="range" id="input-zoom" min="0.5" max="4" step="0.01" value="1">
                        <button onclick="window.saveChanges()" class="w-full py-5 bg-blue-900 text-white rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-blue-800 transition-all active:scale-95 mt-2">
                            Save Changes
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Realtime Sync Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- State ---
        let useFirebase = false;
        let auth = null;
        let db = null;
        let currentUser = null;
        let isAdmin = false;
        let isEditing = false;
        const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'scout-links-pro';
        
        // Apply saved theme immediately
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        // Initialize Links & Settings from Local Storage (Fallbacks)
        let links = JSON.parse(localStorage.getItem('scout_links')) || [
            { id: 1, title: 'Scoutbook', url: 'https://scoutbook.scouting.org/', img: '', zoom: 1, x: 0, y: 0 },
            { id: 2, title: 'Calendar', url: '#', img: '', zoom: 1, x: 0, y: 0 },
            { id: 3, title: 'Uniforms', url: 'https://www.scoutshop.org/', img: '', zoom: 1, x: 0, y: 0 }
        ];
        let settings = JSON.parse(localStorage.getItem('scout_settings')) || {
            title: 'Pack 121',
            subtitle: 'Scouting America',
            logo: 'https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png',
            zoom: 1, x: 0, y: 0
        };

        let currentEditId = null;
        let isDragging = false;
        let startX, startY;

        // --- Firebase Init ---
        try {
            const fbConfigString = typeof window.__firebase_config !== 'undefined' ? window.__firebase_config : null;
            if (fbConfigString) {
                const fbConfig = JSON.parse(fbConfigString);
                if (fbConfig && fbConfig.apiKey) {
                    const app = initializeApp(fbConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);
                    useFirebase = true;
                }
            }
        } catch (e) {
            console.warn("Falling back to local storage.");
        }

        // --- Auth & Sync Loop ---
        if (useFirebase) {
            const initAuth = async () => {
                if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                    await signInWithCustomToken(auth, window.__initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            initAuth();

            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) {
                    // Critical Fix: Firebase doc() requires an EVEN number of string segments.
                    // Pattern: artifacts / {appId} / public / data / {collectionName} / {documentName}
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'packData', 'config');
                    onSnapshot(docRef, (snap) => {
                        if (snap.exists()) {
                            const data = snap.data();
                            if (data.links) links = data.links;
                            if (data.settings) settings = data.settings;
                            window.render();
                        }
                    }, (error) => console.error("Sync Error: ", error));
                }
            });
        }

        window.syncToCloud = async function() {
            if (!useFirebase || !currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'packData', 'config');
                await setDoc(docRef, { links, settings, updatedAt: Date.now() });
            } catch (error) {
                console.error("Failed to push updates to cloud:", error);
            }
        };

        // --- Core Functions ---
        window.render = function() {
            const grid = document.getElementById('links-grid');
            if (!grid) return;
            
            grid.innerHTML = '';

            links.forEach(link => {
                const card = document.createElement('div');
                card.className = 'relative group';
                card.innerHTML = `
                    ${isEditing ? `
                        <div class="absolute top-4 right-4 z-20 flex gap-2">
                            <button onclick="window.editLink(${link.id})" class="p-2 bg-blue-600 text-white rounded-lg shadow-lg hover:scale-110 transition-transform">
                                <i data-lucide="edit-2" class="w-4 h-4"></i>
                            </button>
                            <button onclick="window.deleteLink(${link.id})" class="p-2 bg-red-600 text-white rounded-lg shadow-lg hover:scale-110 transition-transform">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    ` : ''}
                    <a href="${isEditing ? 'javascript:void(0)' : link.url}" target="_blank" class="scout-card p-6 md:p-8 flex flex-col items-center text-center block h-full">
                        <div class="image-viewport mb-4 md:mb-6">
                            <img src="${link.img || 'https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png'}" 
                                 style="transform: translate(${link.x}px, ${link.y}px) scale(${link.zoom}); opacity: ${link.img ? 1 : 0.1}"
                                 class="max-w-none h-full object-contain pointer-events-none">
                        </div>
                        <span class="text-blue-900 dark:text-slate-200 font-extrabold uppercase tracking-widest text-xs md:text-sm line-clamp-2">${link.title}</span>
                    </a>
                `;
                grid.appendChild(card);
            });

            if (isEditing) {
                const addBtn = document.createElement('button');
                addBtn.onclick = window.addNewLink;
                addBtn.className = 'scout-card border-4 border-dashed border-slate-200 dark:border-slate-800 bg-transparent flex flex-col items-center justify-center p-8 min-h-[250px] opacity-40 hover:opacity-100 hover:border-blue-500 cursor-pointer transition-all';
                addBtn.innerHTML = `
                    <i data-lucide="plus" class="w-12 h-12 text-slate-400 mb-4 pointer-events-none"></i>
                    <span class="font-black text-slate-400 uppercase tracking-widest pointer-events-none text-xs">Add Link</span>
                `;
                grid.appendChild(addBtn);
            }

            // Sync Header Texts & Logo
            document.getElementById('display-title').innerText = settings.title;
            document.getElementById('display-subtitle').innerText = settings.subtitle;
            const logo = document.getElementById('main-logo');
            logo.src = settings.logo;
            logo.style.transform = `translate(${settings.x}px, ${settings.y}px) scale(${settings.zoom})`;

            // Render Dynamic UI Buttons Based on State
            const isDark = document.documentElement.classList.contains('dark');
            const themeBtn = document.getElementById('theme-btn');
            themeBtn.innerHTML = isDark ? '<i data-lucide="sun" class="w-5 h-5"></i>' : '<i data-lucide="moon" class="w-5 h-5"></i>';

            const lockBtn = document.getElementById('lock-btn');
            if (isAdmin) {
                lockBtn.className = "w-14 h-14 rounded-2xl flex items-center justify-center bg-yellow-400 shadow-2xl transition-all hover:scale-110 active:scale-95 z-50";
                lockBtn.innerHTML = '<i data-lucide="unlock" class="text-blue-900 w-6 h-6"></i>';
            } else {
                lockBtn.className = "w-14 h-14 rounded-2xl flex items-center justify-center bg-blue-900 shadow-2xl transition-all hover:scale-110 active:scale-95 z-50";
                lockBtn.innerHTML = '<i data-lucide="lock" class="text-white w-6 h-6"></i>';
            }

            const adminBtn = document.getElementById('admin-toggle-btn');
            if (isAdmin) {
                adminBtn.classList.remove('hidden');
                if (isEditing) {
                    adminBtn.innerHTML = '<i data-lucide="settings" class="w-5 h-5 text-blue-900"></i><span class="text-sm">Finish</span>';
                    adminBtn.className = "flex items-center gap-2 px-5 py-3 rounded-2xl bg-yellow-400 text-blue-900 border-2 border-yellow-400 font-bold uppercase tracking-widest shadow-lg transition-all";
                } else {
                    adminBtn.innerHTML = '<i data-lucide="settings" class="w-5 h-5"></i><span class="text-sm">Admin</span>';
                    adminBtn.className = "flex items-center gap-2 px-5 py-3 rounded-2xl bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 font-bold uppercase tracking-widest shadow-lg transition-all hover:bg-slate-50 dark:hover:bg-slate-700";
                }
            } else {
                adminBtn.classList.add('hidden');
            }

            const headerBtn = document.getElementById('edit-header-btn');
            if (isEditing) {
                headerBtn.classList.remove('hidden');
                headerBtn.innerHTML = '<i data-lucide="edit-3" class="w-5 h-5"></i>';
            } else {
                headerBtn.classList.add('hidden');
            }

            // Fire Lucide
            if (window.lucide) window.lucide.createIcons();
            
            // Backup locally
            localStorage.setItem('scout_links', JSON.stringify(links));
            localStorage.setItem('scout_settings', JSON.stringify(settings));
        };

        // --- Admin Actions ---
        window.handleAuthClick = function() {
            if (isAdmin) {
                // User is signing out
                isAdmin = false;
                isEditing = false; // Forces Admin mode off
                window.render();
            } else {
                const pass = prompt("Leader Access Key (Default: CoRf121):");
                if (pass === 'CoRf121') {
                    isAdmin = true;
                    isEditing = false; // Start with clean view, they must click Admin to edit
                    window.render();
                }
            }
        };

        window.toggleAdminMode = function() {
            isEditing = !isEditing;
            window.render();
        };

        window.toggleDarkMode = function() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            window.render();
        };

        // --- Modal & Drag Logic ---
        window.openHeaderModal = function() {
            currentEditId = 'header';
            document.getElementById('modal-title').innerText = "Identity Settings";
            document.getElementById('label-url').innerText = "Subtitle";
            document.getElementById('input-title').value = settings.title;
            document.getElementById('input-url').value = settings.subtitle;
            document.getElementById('input-image').value = settings.logo;
            document.getElementById('input-zoom').value = settings.zoom;
            window.updatePreview();
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
        };

        window.editLink = function(id) {
            currentEditId = id;
            const link = links.find(l => l.id === id);
            document.getElementById('modal-title').innerText = "Tile Settings";
            document.getElementById('label-url').innerText = "URL";
            document.getElementById('input-title').value = link.title;
            document.getElementById('input-url').value = link.url;
            document.getElementById('input-image').value = link.img;
            document.getElementById('input-zoom').value = link.zoom;
            window.updatePreview();
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
        };

        window.addNewLink = function() {
            const newId = Date.now();
            links.push({ id: newId, title: 'New Link', url: '', img: '', zoom: 1, x: 0, y: 0 });
            window.editLink(newId);
        };

        window.deleteLink = function(id) {
            if (confirm("Remove this tile?")) {
                links = links.filter(l => l.id !== id);
                window.render();
                window.syncToCloud();
            }
        };

        window.closeModal = function() {
            document.getElementById('modal-overlay').classList.replace('flex', 'hidden');
        };

        window.updatePreview = function() {
            const img = document.getElementById('preview-img');
            const zoom = document.getElementById('input-zoom').value;
            img.src = document.getElementById('input-image').value || 'https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png';
            document.getElementById('zoom-val').innerText = parseFloat(zoom).toFixed(2) + 'x';
            
            let obj = currentEditId === 'header' ? settings : links.find(l => l.id === currentEditId);
            if (obj) {
                img.style.transform = `translate(${obj.x}px, ${obj.y}px) scale(${zoom})`;
            }
        };

        window.saveChanges = function() {
            if (currentEditId === 'header') {
                settings.title = document.getElementById('input-title').value;
                settings.subtitle = document.getElementById('input-url').value;
                settings.logo = document.getElementById('input-image').value;
                settings.zoom = document.getElementById('input-zoom').value;
            } else {
                const link = links.find(l => l.id === currentEditId);
                if (link) {
                    link.title = document.getElementById('input-title').value;
                    let safeUrl = document.getElementById('input-url').value.trim();
                    if (safeUrl && !safeUrl.startsWith('http')) safeUrl = 'https://' + safeUrl;
                    link.url = safeUrl;
                    link.img = document.getElementById('input-image').value;
                    link.zoom = document.getElementById('input-zoom').value;
                }
            }
            window.closeModal();
            window.render();
            window.syncToCloud(); // Save to Firebase on every modal save
        };

        // --- Event Listeners ---
        document.getElementById('input-image').addEventListener('input', window.updatePreview);
        document.getElementById('input-zoom').addEventListener('input', window.updatePreview);

        const previewBox = document.getElementById('preview-box');
        previewBox.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            startX = e.clientX;
            startY = e.clientY;

            let obj = currentEditId === 'header' ? settings : links.find(l => l.id === currentEditId);
            if (obj) {
                obj.x += dx;
                obj.y += dy;
                window.updatePreview();
            }
        });

        window.addEventListener('mouseup', () => isDragging = false);

        // Init setup ensures render runs immediately
        window.onload = () => {
            window.render();
        };
    </script>
</body>
</html>
