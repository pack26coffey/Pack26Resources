<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Links Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bsa-blue: #003F87;
            --bsa-red: #CE1126;
            --bsa-gold: #FDC82F;
        }
        
        body { 
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            transition: background-color 0.5s ease;
        }

        .dark body { 
            background-color: #020617; 
            color: #f8fafc; 
        }

        .scout-card {
            background: white; 
            border-radius: 2.5rem; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0,63,135,0.05); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .dark .scout-card { 
            background: #0f172a; 
            border-color: rgba(255,255,255,0.05); 
        }

        .scout-card:hover { 
            transform: translateY(-12px) scale(1.02); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border-color: var(--bsa-blue);
        }

        .image-viewport { 
            width: 100%; 
            height: 180px; 
            position: relative; 
            overflow: hidden; 
            border-radius: 2rem; 
            background: #f1f5f9; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .dark .image-viewport { background: #1e293b; }

        .admin-btn {
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.2s ease;
        }

        .scout-card:hover .admin-btn {
            opacity: 1;
            transform: scale(1);
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 5px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--bsa-blue);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
        }

        .modal-animate {
            animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen">
    <div id="app">
        <!-- Header -->
        <header class="bg-white dark:bg-slate-900 border-b-[12px] border-yellow-400 shadow-2xl px-6 py-12 transition-colors">
            <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-10">
                <div class="relative group">
                    <div id="header-logo-container" class="w-44 h-44 rounded-[3rem] bg-slate-50 dark:bg-slate-800 shadow-inner flex items-center justify-center overflow-hidden border-8 border-white dark:border-slate-700 transition-all">
                        <img id="main-logo" src="https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png" class="max-w-none h-full object-contain">
                    </div>
                    <button onclick="window.openHeaderModal()" class="admin-only absolute -bottom-3 -right-3 p-4 bg-blue-600 text-white rounded-2xl shadow-xl hidden hover:scale-110">
                        <i data-lucide="edit-3"></i>
                    </button>
                </div>

                <div class="text-center md:text-left flex-1">
                    <h1 id="display-title" class="text-6xl md:text-8xl font-black text-blue-900 dark:text-blue-500 uppercase tracking-tighter mb-2 leading-none">
                        Pack 121
                    </h1>
                    <div class="text-xl font-bold text-slate-400 dark:text-slate-500 uppercase tracking-[0.4em] flex items-center justify-center md:justify-start gap-3">
                        <i data-lucide="star" class="text-yellow-500 fill-yellow-500"></i>
                        <span id="display-subtitle">Scouting America</span>
                    </div>
                </div>

                <div class="flex gap-4">
                    <button onclick="window.toggleDarkMode()" class="p-6 rounded-[2rem] bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-yellow-400 hover:text-blue-900 transition-all shadow-lg">
                        <i data-lucide="moon" id="theme-icon"></i>
                    </button>
                    <button onclick="window.toggleAdminMode()" id="admin-toggle-btn" class="hidden flex items-center gap-3 px-8 py-6 rounded-[2rem] bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 font-bold uppercase tracking-widest shadow-lg">
                        <i data-lucide="settings"></i>
                        <span>Admin</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Grid -->
        <main class="max-w-7xl mx-auto py-20 px-6">
            <div id="links-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <!-- Links injected here -->
            </div>
        </main>

        <!-- Auth & Footer -->
        <div class="fixed bottom-12 right-12 z-50">
            <button onclick="window.handleAuthClick()" id="lock-btn" class="w-20 h-20 rounded-[2rem] flex items-center justify-center bg-blue-900 shadow-2xl transition-all hover:rotate-12 active:scale-90">
                <i data-lucide="lock" class="text-white" id="lock-icon"></i>
            </button>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[100] hidden items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-900 rounded-[4rem] w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl modal-animate border-b-[16px] border-blue-900">
            <div class="bg-blue-900 p-10 text-white flex justify-between items-center">
                <h3 id="modal-title" class="text-3xl font-black uppercase tracking-widest">Tile Settings</h3>
                <button onclick="window.closeModal()" class="p-4 hover:bg-white/10 rounded-full"><i data-lucide="x"></i></button>
            </div>
            
            <div class="p-10 overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-12">
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Title</label>
                        <input id="input-title" class="w-full p-5 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold text-lg outline-none focus:ring-4 ring-blue-900/10 dark:text-white">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest" id="label-url">URL</label>
                        <input id="input-url" class="w-full p-5 bg-slate-100 dark:bg-slate-800 rounded-2xl outline-none dark:text-white" placeholder="https://...">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Image Source</label>
                        <input id="input-image" class="w-full p-5 bg-slate-100 dark:bg-slate-800 rounded-2xl text-sm font-mono outline-none dark:text-white">
                    </div>
                </div>

                <div class="flex flex-col items-center">
                    <div id="preview-box" class="w-64 h-64 bg-slate-100 dark:bg-slate-800 rounded-[3rem] overflow-hidden relative border-8 border-slate-200 dark:border-slate-700 shadow-2xl cursor-move">
                        <img id="preview-img" src="" class="max-w-none h-full object-contain pointer-events-none">
                    </div>
                    <div class="w-full mt-8 space-y-4">
                        <div class="flex justify-between text-[10px] font-black text-slate-400 uppercase tracking-widest">
                            <span>Zoom</span>
                            <span id="zoom-val" class="text-blue-600">1.0x</span>
                        </div>
                        <input type="range" id="input-zoom" min="0.5" max="4" step="0.01" value="1">
                        <button onclick="window.saveChanges()" class="w-full py-6 bg-blue-900 text-white rounded-[2rem] font-black uppercase tracking-widest shadow-xl hover:bg-blue-800 transition-all active:scale-95 mt-4">
                            Save Changes
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Realtime Sync Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Init ---
        const fbConfig = typeof window.__firebase_config !== 'undefined' ? JSON.parse(window.__firebase_config) : {};
        const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'scout-links-pro';
        
        const app = initializeApp(fbConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- State ---
        let currentUser = null;
        let isAdmin = false;
        let isEditing = false;
        let links = JSON.parse(localStorage.getItem('scout_links')) || [
            { id: 1, title: 'Scoutbook', url: 'https://scoutbook.scouting.org/', img: '', zoom: 1, x: 0, y: 0 },
            { id: 2, title: 'Calendar', url: '#', img: '', zoom: 1, x: 0, y: 0 },
            { id: 3, title: 'Uniforms', url: 'https://www.scoutshop.org/', img: '', zoom: 1, x: 0, y: 0 }
        ];
        let settings = JSON.parse(localStorage.getItem('scout_settings')) || {
            title: 'Pack 121',
            subtitle: 'Scouting America',
            logo: 'https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png',
            zoom: 1, x: 0, y: 0
        };

        let currentEditId = null;
        let isDragging = false;
        let startX, startY;

        // --- Auth & Sync Loop ---
        const initAuth = async () => {
            if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                await signInWithCustomToken(auth, window.__initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'config');
                onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        if (data.links) links = data.links;
                        if (data.settings) settings = data.settings;
                        window.render();
                    }
                }, (error) => console.error("Sync Error: ", error));
            }
        });

        window.syncToCloud = async function() {
            if (!currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'config');
                await setDoc(docRef, { links, settings, updatedAt: Date.now() });
            } catch (error) {
                console.error("Failed to push updates:", error);
            }
        };

        // --- Core Functions ---
        window.render = function() {
            const grid = document.getElementById('links-grid');
            grid.innerHTML = '';

            links.forEach(link => {
                const card = document.createElement('div');
                card.className = 'relative group';
                card.innerHTML = `
                    ${isEditing ? `
                        <div class="absolute top-4 right-4 z-20 flex gap-2">
                            <button onclick="window.editLink(${link.id})" class="p-3 bg-blue-600 text-white rounded-xl shadow-lg hover:scale-110 transition-transform">
                                <i data-lucide="edit-2"></i>
                            </button>
                            <button onclick="window.deleteLink(${link.id})" class="p-3 bg-red-600 text-white rounded-xl shadow-lg hover:scale-110 transition-transform">
                                <i data-lucide="trash-2"></i>
                            </button>
                        </div>
                    ` : ''}
                    <a href="${isEditing ? 'javascript:void(0)' : link.url}" target="_blank" class="scout-card p-8 flex flex-col items-center text-center block h-full">
                        <div class="image-viewport mb-6">
                            <img src="${link.img || 'https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png'}" 
                                 style="transform: translate(${link.x}px, ${link.y}px) scale(${link.zoom}); opacity: ${link.img ? 1 : 0.1}"
                                 class="max-w-none h-full object-contain pointer-events-none">
                        </div>
                        <span class="text-blue-900 dark:text-slate-200 font-extrabold uppercase tracking-widest text-sm">${link.title}</span>
                    </a>
                `;
                grid.appendChild(card);
            });

            if (isEditing) {
                const addBtn = document.createElement('button');
                addBtn.onclick = window.addNewLink;
                addBtn.className = 'scout-card border-4 border-dashed border-slate-200 dark:border-slate-800 bg-transparent flex flex-col items-center justify-center p-8 min-h-[300px] opacity-40 hover:opacity-100 hover:border-blue-500 cursor-pointer';
                addBtn.innerHTML = `
                    <i data-lucide="plus" class="w-16 h-16 text-slate-400 mb-4 pointer-events-none"></i>
                    <span class="font-black text-slate-400 uppercase tracking-widest pointer-events-none">Add Link</span>
                `;
                grid.appendChild(addBtn);
            }

            // Sync Header
            document.getElementById('display-title').innerText = settings.title;
            document.getElementById('display-subtitle').innerText = settings.subtitle;
            const logo = document.getElementById('main-logo');
            logo.src = settings.logo;
            logo.style.transform = `translate(${settings.x}px, ${settings.y}px) scale(${settings.zoom})`;

            lucide.createIcons();
            
            // Backup locally for faster initial load
            localStorage.setItem('scout_links', JSON.stringify(links));
            localStorage.setItem('scout_settings', JSON.stringify(settings));
        };

        // --- Admin Actions ---
        window.handleAuthClick = function() {
            if (isAdmin) {
                isAdmin = false;
                isEditing = false;
                document.querySelectorAll('.admin-only').forEach(el => el.classList.add('hidden'));
                document.getElementById('admin-toggle-btn').classList.add('hidden');
                document.getElementById('lock-btn').classList.replace('bg-yellow-400', 'bg-blue-900');
                document.getElementById('lock-icon').innerHTML = lucide.icons.lock.toSvg();
                window.render();
            } else {
                const pass = prompt("Leader Access Key:");
                if (pass === 'CoRf121') {
                    isAdmin = true;
                    isEditing = true;
                    document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
                    document.getElementById('admin-toggle-btn').classList.remove('hidden');
                    document.getElementById('lock-btn').classList.replace('bg-blue-900', 'bg-yellow-400');
                    document.getElementById('lock-icon').innerHTML = lucide.icons.unlock.toSvg();
                    window.render();
                }
            }
        };

        window.toggleAdminMode = function() {
            isEditing = !isEditing;
            window.render();
        };

        window.toggleDarkMode = function() {
            document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            const isDark = document.documentElement.classList.contains('dark');
            icon.innerHTML = isDark ? lucide.icons.sun.toSvg() : lucide.icons.moon.toSvg();
        };

        // --- Modal & Drag Logic ---
        window.openHeaderModal = function() {
            currentEditId = 'header';
            document.getElementById('modal-title').innerText = "Identity Settings";
            document.getElementById('label-url').innerText = "Subtitle";
            document.getElementById('input-title').value = settings.title;
            document.getElementById('input-url').value = settings.subtitle;
            document.getElementById('input-image').value = settings.logo;
            document.getElementById('input-zoom').value = settings.zoom;
            window.updatePreview();
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
        };

        window.editLink = function(id) {
            currentEditId = id;
            const link = links.find(l => l.id === id);
            document.getElementById('modal-title').innerText = "Tile Settings";
            document.getElementById('label-url').innerText = "URL";
            document.getElementById('input-title').value = link.title;
            document.getElementById('input-url').value = link.url;
            document.getElementById('input-image').value = link.img;
            document.getElementById('input-zoom').value = link.zoom;
            window.updatePreview();
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
        };

        window.addNewLink = function() {
            const newId = Date.now();
            links.push({ id: newId, title: 'New Link', url: '', img: '', zoom: 1, x: 0, y: 0 });
            window.editLink(newId);
        };

        window.deleteLink = function(id) {
            if (confirm("Remove this tile?")) {
                links = links.filter(l => l.id !== id);
                window.render();
                window.syncToCloud();
            }
        };

        window.closeModal = function() {
            document.getElementById('modal-overlay').classList.replace('flex', 'hidden');
        };

        window.updatePreview = function() {
            const img = document.getElementById('preview-img');
            const zoom = document.getElementById('input-zoom').value;
            img.src = document.getElementById('input-image').value || 'https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png';
            document.getElementById('zoom-val').innerText = parseFloat(zoom).toFixed(2) + 'x';
            
            let obj = currentEditId === 'header' ? settings : links.find(l => l.id === currentEditId);
            if (obj) {
                img.style.transform = `translate(${obj.x}px, ${obj.y}px) scale(${zoom})`;
            }
        };

        window.saveChanges = function() {
            if (currentEditId === 'header') {
                settings.title = document.getElementById('input-title').value;
                settings.subtitle = document.getElementById('input-url').value;
                settings.logo = document.getElementById('input-image').value;
                settings.zoom = document.getElementById('input-zoom').value;
            } else {
                const link = links.find(l => l.id === currentEditId);
                if (link) {
                    link.title = document.getElementById('input-title').value;
                    link.url = document.getElementById('input-url').value;
                    link.img = document.getElementById('input-image').value;
                    link.zoom = document.getElementById('input-zoom').value;
                }
            }
            window.closeModal();
            window.render();
            window.syncToCloud();
        };

        // --- Event Listeners ---
        document.getElementById('input-image').addEventListener('input', window.updatePreview);
        document.getElementById('input-zoom').addEventListener('input', window.updatePreview);

        const previewBox = document.getElementById('preview-box');
        previewBox.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            startX = e.clientX;
            startY = e.clientY;

            let obj = currentEditId === 'header' ? settings : links.find(l => l.id === currentEditId);
            if (obj) {
                obj.x += dx;
                obj.y += dy;
                window.updatePreview();
            }
        });

        window.addEventListener('mouseup', () => isDragging = false);

        // Init setup
        window.onload = () => {
            window.render();
        };
    </script>
</body>
</html>
