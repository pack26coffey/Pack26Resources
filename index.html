<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack 26 Resources</title>
    
    <script>
        tailwind = {
            config: {
                darkMode: 'class',
                theme: {
                    extend: {
                        colors: {
                            bsa: { blue: '#003F87', gold: '#FDC82F' }
                        }
                    }
                }
            }
        }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scout-card { 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }
        
        .preview-container {
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }
        .preview-image {
            position: absolute;
            transform-origin: center center;
            user-select: none;
            -webkit-user-drag: none;
        }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #FDC82F;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #cbd5e1;
            border-radius: 2px;
        }
        .dark input[type=range]::-webkit-slider-runnable-track {
            background: #334155;
        }
    </style>
</head>
<body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-50 transition-colors duration-300">
    <div id="app" class="min-h-screen pb-24">
        <!-- Header Section -->
        <header class="bg-slate-50 dark:bg-slate-900 border-b-8 border-yellow-400 shadow-xl px-6 py-10 transition-colors duration-300 relative">
            <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-8 relative">
                
                <div class="w-32 h-32 rounded-3xl bg-white dark:bg-slate-800 flex items-center justify-center p-4 border-4 border-slate-200 dark:border-slate-700 shadow-inner relative group">
                    <img id="header-logo" src="" class="max-h-full max-w-full object-contain" alt="Logo">
                </div>

                <div class="text-center md:text-left flex-1 relative">
                    <h1 id="header-title" class="text-4xl md:text-6xl font-black text-[#003F87] dark:text-blue-400 uppercase tracking-tighter"></h1>
                    <p id="header-subtitle" class="text-lg font-bold text-slate-400 uppercase tracking-widest mt-2"></p>
                    
                    <button id="edit-header-btn" onclick="openHeaderModal()" class="hidden absolute -top-4 -right-4 md:-right-12 md:top-2 bg-blue-500 text-white p-2 rounded-full shadow-lg hover:scale-110 transition-transform">
                        <i data-lucide="edit-3" class="w-5 h-5"></i>
                    </button>
                </div>

                <div class="flex gap-3">
                    <button id="theme-toggle" class="p-4 rounded-2xl bg-yellow-400 text-[#003F87] hover:bg-yellow-300 hover:scale-105 transition-all shadow-lg border-2 border-transparent dark:border-[#003F87]">
                        <i data-lucide="moon" id="theme-icon" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Links Gallery -->
        <main class="max-w-6xl mx-auto py-12 px-6">
            <div id="links-container" class="bento-grid">
                <!-- Content generated by JS -->
            </div>
        </main>

        <!-- Admin Access Button -->
        <div class="fixed bottom-8 right-8 z-40">
            <button id="lock-btn" class="w-16 h-16 rounded-2xl bg-[#003F87] flex items-center justify-center shadow-2xl hover:scale-110 transition-transform active:scale-95 border-2 border-white/20">
                <i data-lucide="lock" id="lock-icon" class="text-white w-6 h-6"></i>
            </button>
        </div>

        <!-- Leader Login Modal -->
        <div id="modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
            <div class="bg-white dark:bg-slate-900 p-8 rounded-[2rem] w-full max-w-sm shadow-2xl border-t-8 border-blue-900 text-center relative">
                <div class="w-16 h-16 bg-blue-50 dark:bg-blue-900/30 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="shield-check" class="text-blue-900 dark:text-blue-400 w-8 h-8"></i>
                </div>
                <h2 class="text-2xl font-black uppercase mb-2 dark:text-white">Leader Access</h2>
                <p class="text-slate-400 text-sm mb-4">Enter the pack password to edit</p>
                
                <p id="login-error" class="text-red-500 text-xs font-bold mb-4 hidden uppercase">Incorrect password!</p>
                
                <input type="password" id="pass-input" placeholder="••••••••" class="w-full p-4 rounded-xl bg-slate-100 dark:bg-slate-800 mb-6 text-center font-bold outline-none focus:ring-2 focus:ring-blue-900 dark:focus:ring-blue-500 dark:text-white">
                
                <div class="flex gap-3">
                    <button id="cancel-btn" class="flex-1 py-3 text-slate-400 font-bold uppercase text-xs hover:bg-slate-100 dark:bg-slate-800 dark:hover:bg-slate-700 rounded-xl transition-colors">Cancel</button>
                    <button id="login-btn" class="flex-[2] py-3 bg-blue-900 text-white rounded-xl font-bold uppercase text-sm hover:bg-blue-800 shadow-lg transition-colors">Login</button>
                </div>
            </div>
        </div>

        <!-- Edit Header Modal -->
        <div id="header-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm hidden items-center justify-center z-50 p-4 overflow-y-auto">
            <div class="bg-white dark:bg-slate-900 p-8 rounded-[2rem] w-full max-w-md shadow-2xl border-t-8 border-blue-500 my-8">
                <h2 class="text-2xl font-black uppercase mb-6 text-blue-500">Edit Header</h2>
                
                <div class="space-y-4 mb-8">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Main Title</label>
                        <input type="text" id="edit-header-title" class="w-full p-4 rounded-xl bg-slate-100 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-blue-500 dark:text-white">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Subtitle</label>
                        <input type="text" id="edit-header-subtitle" class="w-full p-4 rounded-xl bg-slate-100 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-blue-500 dark:text-white">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Header Image / Logo URL</label>
                        <input type="text" id="edit-header-img" class="w-full p-4 rounded-xl bg-slate-100 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-blue-500 dark:text-white">
                    </div>
                </div>
                
                <div class="flex gap-3">
                    <button onclick="closeHeaderModal()" class="flex-1 py-4 text-slate-500 font-bold uppercase text-xs hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors">Cancel</button>
                    <button onclick="saveHeader()" class="flex-[2] py-4 bg-blue-500 text-white rounded-xl font-black uppercase text-sm hover:bg-blue-600 shadow-lg">Save Changes</button>
                </div>
            </div>
        </div>

        <!-- Edit/Add Link Modal -->
        <div id="edit-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm hidden items-center justify-center z-50 p-4 overflow-y-auto">
            <div class="bg-white dark:bg-slate-900 p-8 rounded-[2rem] w-full max-w-lg shadow-2xl border-t-8 border-yellow-400 my-8">
                <h2 id="edit-modal-title" class="text-2xl font-black uppercase mb-6 text-[#003F87] dark:text-yellow-400">Add Link</h2>
                
                <input type="hidden" id="edit-index">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Button Title</label>
                            <input type="text" id="edit-title" class="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-yellow-400 dark:text-white text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Web Address (URL)</label>
                            <input type="text" id="edit-url" class="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-yellow-400 dark:text-white text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Image URL</label>
                            <input type="text" id="edit-img" class="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-yellow-400 dark:text-white text-sm">
                        </div>
                    </div>

                    <div class="flex flex-col items-center bg-slate-50 dark:bg-slate-800/50 p-4 rounded-2xl border border-slate-100 dark:border-slate-700">
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-3 w-full text-center">Icon Editor (Drag to Move)</label>
                        <div class="preview-container w-32 h-32 bg-white dark:bg-slate-900 rounded-2xl border-2 border-dashed border-slate-300 dark:border-slate-600 mb-4 cursor-move shadow-inner" id="preview-box">
                            <img id="preview-image" src="" class="preview-image pointer-events-none" alt="Preview">
                        </div>
                        <div class="w-full px-2">
                            <div class="flex justify-between text-[10px] text-slate-400 font-bold uppercase mb-1">
                                <span>Smaller</span>
                                <span>Larger</span>
                            </div>
                            <input type="range" id="scale-slider" min="0.2" max="3" step="0.1" value="1">
                        </div>
                    </div>
                </div>
                
                <div class="flex gap-3">
                    <button onclick="closeEditModal()" class="flex-1 py-4 text-slate-500 font-bold uppercase text-xs hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors">Cancel</button>
                    <button onclick="saveLink()" class="flex-[2] py-4 bg-yellow-400 text-[#003F87] rounded-xl font-black uppercase text-sm hover:bg-yellow-300 shadow-lg">Save Link</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- STATE & DATA ---
        let darkMode = localStorage.getItem('theme') === 'dark';
        let isAdmin = false;
        
        const defaultHeader = {
            title: 'Pack 26 Resources',
            subtitle: 'Scouting America',
            logo: 'https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png'
        };
        let headerData = JSON.parse(localStorage.getItem('pack26Header')) || defaultHeader;

        const defaultLinks = [
            { title: 'Scoutbook', url: 'https://scoutbook.scouting.org/', img: 'https://help.scoutbook.scouting.org/wp-content/uploads/2019/11/SB-logo-2.png', scale: 1, x: 0, y: 0 },
            { title: 'Scout Shop', url: 'https://www.scoutshop.org/', img: 'https://www.scouting.org/wp-content/themes/bsa-master/images/fleur-de-lis.png', scale: 1, x: 0, y: 0 },
            { title: 'Scout Life', url: 'https://scoutlife.org/', img: 'https://scoutlife.org/wp-content/uploads/2020/08/sl-logo-2020.png', scale: 1, x: 0, y: 0 },
            { title: 'Pack Calendar', url: '#', img: 'https://cdn-icons-png.flaticon.com/512/3652/3652191.png', scale: 1, x: 0, y: 0 }
        ];
        let scoutLinks = JSON.parse(localStorage.getItem('pack26Links')) || defaultLinks;

        function saveToStorage() {
            localStorage.setItem('pack26Links', JSON.stringify(scoutLinks));
            localStorage.setItem('pack26Header', JSON.stringify(headerData));
        }

        // --- IMAGE EDITOR STATE ---
        let currentScale = 1;
        let currentX = 0;
        let currentY = 0;
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;

        const previewImgEl = document.getElementById('preview-image');
        const previewBox = document.getElementById('preview-box');
        const scaleSlider = document.getElementById('scale-slider');
        const imgInput = document.getElementById('edit-img');

        // --- REORDERING LOGIC ---
        function moveTile(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= scoutLinks.length) return;
            
            const item = scoutLinks.splice(index, 1)[0];
            scoutLinks.splice(newIndex, 0, item);
            
            saveToStorage();
            updateUI();
        }

        // --- UI RENDERER ---
        function updateUI() {
            document.documentElement.classList.toggle('dark', darkMode);
            document.getElementById('theme-icon').setAttribute('data-lucide', darkMode ? 'sun' : 'moon');

            document.getElementById('header-title').innerText = headerData.title;
            document.getElementById('header-subtitle').innerText = headerData.subtitle;
            document.getElementById('header-logo').src = headerData.logo;

            const lockIcon = document.getElementById('lock-icon');
            const lockBtn = document.getElementById('lock-btn');
            lockIcon.setAttribute('data-lucide', isAdmin ? 'unlock' : 'lock');
            lockBtn.className = isAdmin 
                ? "w-16 h-16 rounded-2xl bg-yellow-400 flex items-center justify-center shadow-2xl hover:scale-110 transition-transform active:scale-95 border-2 border-white"
                : "w-16 h-16 rounded-2xl bg-[#003F87] flex items-center justify-center shadow-2xl hover:scale-110 transition-transform active:scale-95 border-2 border-white/20";
            
            const headerBtn = document.getElementById('edit-header-btn');
            headerBtn.classList.toggle('hidden', !isAdmin);

            const container = document.getElementById('links-container');
            let html = scoutLinks.map((link, index) => {
                const s = link.scale || 1;
                const tx = link.x || 0;
                const ty = link.y || 0;
                
                return `
                <div class="relative group h-full">
                    ${isAdmin ? `
                    <!-- Control Overlay -->
                    <div class="absolute -top-3 -left-3 -right-3 z-10 flex justify-between pointer-events-none">
                        <!-- Movement Controls -->
                        <div class="flex gap-1 pointer-events-auto">
                            ${index > 0 ? `
                                <button onclick="moveTile(${index}, -1)" class="p-2 bg-slate-800 text-white rounded-lg shadow-xl hover:bg-blue-500 transition-colors">
                                    <i data-lucide="chevron-left" class="w-4 h-4"></i>
                                </button>
                            ` : '<div class="w-8"></div>'}
                            ${index < scoutLinks.length - 1 ? `
                                <button onclick="moveTile(${index}, 1)" class="p-2 bg-slate-800 text-white rounded-lg shadow-xl hover:bg-blue-500 transition-colors">
                                    <i data-lucide="chevron-right" class="w-4 h-4"></i>
                                </button>
                            ` : ''}
                        </div>
                        <!-- Edit Controls -->
                        <div class="flex gap-1 pointer-events-auto">
                            <button onclick="openEditModal(${index})" class="p-2 bg-blue-500 text-white rounded-lg shadow-xl hover:scale-110 transition-transform">
                                <i data-lucide="edit-2" class="w-4 h-4"></i>
                            </button>
                            <button onclick="deleteLink(${index})" class="p-2 bg-red-500 text-white rounded-lg shadow-xl hover:scale-110 transition-transform">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                    ` : ''}
                    <a href="${isAdmin ? 'javascript:void(0)' : link.url}" ${isAdmin ? '' : 'target="_blank"'} class="scout-card block h-full bg-slate-50 dark:bg-slate-900 p-6 rounded-[2rem] shadow-lg flex flex-col items-center border border-slate-200 dark:border-slate-800 hover:shadow-2xl hover:-translate-y-1 transition-all">
                        <div class="w-full aspect-square bg-white dark:bg-slate-950 rounded-2xl mb-4 flex items-center justify-center p-0 border border-slate-100 dark:border-slate-800/50 overflow-hidden relative">
                            <img src="${link.img}" class="max-w-none absolute origin-center pointer-events-none" style="transform: translate(${tx}px, ${ty}px) scale(${s}); height: 100%;" alt="${link.title}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3652/3652191.png'">
                        </div>
                        <span class="font-black uppercase text-xs tracking-[0.2em] text-blue-900 dark:text-blue-400 text-center line-clamp-1">${link.title}</span>
                    </a>
                </div>
            `}).join('');

            if (isAdmin) {
                html += `
                <button onclick="openAddModal()" class="bg-transparent border-4 border-dashed border-slate-300 dark:border-slate-700 p-6 rounded-[2rem] flex flex-col items-center justify-center min-h-[200px] hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-all text-slate-400 hover:text-blue-500 group h-full">
                    <div class="p-4 rounded-full bg-slate-100 dark:bg-slate-800 group-hover:bg-blue-100 dark:group-hover:bg-blue-900/50 mb-4 transition-colors">
                        <i data-lucide="plus" class="w-8 h-8"></i>
                    </div>
                    <span class="font-black uppercase text-xs tracking-[0.2em]">Add New Link</span>
                </button>
                `;
            }

            container.innerHTML = html;
            lucide.createIcons();
        }

        // --- MODAL & EDITOR LOGIC ---
        function applyEditorTransform() {
            previewImgEl.style.transform = `translate(${currentX}px, ${currentY}px) scale(${currentScale})`;
            previewImgEl.style.height = "100%";
        }

        imgInput.addEventListener('input', e => previewImgEl.src = e.target.value || 'https://cdn-icons-png.flaticon.com/512/3652/3652191.png');
        scaleSlider.addEventListener('input', e => { currentScale = parseFloat(e.target.value); applyEditorTransform(); });

        function startDrag(clientX, clientY) { isDragging = true; dragStartX = clientX - currentX; dragStartY = clientY - currentY; }
        function doDrag(clientX, clientY) { if (!isDragging) return; currentX = clientX - dragStartX; currentY = clientY - dragStartY; applyEditorTransform(); }
        function stopDrag() { isDragging = false; }

        previewBox.addEventListener('mousedown', e => startDrag(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => doDrag(e.clientX, e.clientY));
        window.addEventListener('mouseup', stopDrag);
        previewBox.addEventListener('touchstart', e => startDrag(e.touches[0].clientX, e.touches[0].clientY), {passive: false});
        window.addEventListener('touchmove', e => { if(isDragging) { e.preventDefault(); doDrag(e.touches[0].clientX, e.touches[0].clientY); }}, {passive: false});
        window.addEventListener('touchend', stopDrag);

        function openAddModal() {
            document.getElementById('edit-modal-title').innerText = "Add New Link";
            document.getElementById('edit-index').value = "";
            document.getElementById('edit-title').value = "";
            document.getElementById('edit-url').value = "";
            document.getElementById('edit-img').value = "";
            currentScale = 1; currentX = 0; currentY = 0;
            scaleSlider.value = 1;
            previewImgEl.src = "https://cdn-icons-png.flaticon.com/512/3652/3652191.png";
            applyEditorTransform();
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function openEditModal(index) {
            const link = scoutLinks[index];
            document.getElementById('edit-modal-title').innerText = "Edit Link";
            document.getElementById('edit-index').value = index;
            document.getElementById('edit-title').value = link.title;
            document.getElementById('edit-url').value = link.url;
            document.getElementById('edit-img').value = link.img;
            currentScale = link.scale || 1;
            currentX = link.x || 0;
            currentY = link.y || 0;
            scaleSlider.value = currentScale;
            previewImgEl.src = link.img || 'https://cdn-icons-png.flaticon.com/512/3652/3652191.png';
            applyEditorTransform();
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; }
        function saveLink() {
            const index = document.getElementById('edit-index').value;
            const newLink = {
                title: document.getElementById('edit-title').value || "New Link",
                url: document.getElementById('edit-url').value || "#",
                img: document.getElementById('edit-img').value || "https://cdn-icons-png.flaticon.com/512/3652/3652191.png",
                scale: currentScale, x: currentX, y: currentY
            };
            if (index === "") scoutLinks.push(newLink);
            else scoutLinks[index] = newLink;
            saveToStorage(); closeEditModal(); updateUI();
        }

        function deleteLink(index) { if (confirm("Delete this link?")) { scoutLinks.splice(index, 1); saveToStorage(); updateUI(); } }

        function openHeaderModal() {
            document.getElementById('edit-header-title').value = headerData.title;
            document.getElementById('edit-header-subtitle').value = headerData.subtitle;
            document.getElementById('edit-header-img').value = headerData.logo;
            document.getElementById('header-modal').style.display = 'flex';
        }
        function closeHeaderModal() { document.getElementById('header-modal').style.display = 'none'; }
        function saveHeader() {
            headerData = {
                title: document.getElementById('edit-header-title').value || 'Pack 26',
                subtitle: document.getElementById('edit-header-subtitle').value || 'Scouting',
                logo: document.getElementById('edit-header-img').value || defaultHeader.logo
            };
            saveToStorage(); closeHeaderModal(); updateUI();
        }

        document.getElementById('theme-toggle').addEventListener('click', () => {
            darkMode = !darkMode;
            localStorage.setItem('theme', darkMode ? 'dark' : 'light');
            updateUI();
        });

        document.getElementById('lock-btn').addEventListener('click', () => {
            if (isAdmin) { isAdmin = false; updateUI(); }
            else { document.getElementById('login-error').classList.add('hidden'); document.getElementById('modal').style.display = 'flex'; document.getElementById('pass-input').focus(); }
        });

        document.getElementById('cancel-btn').addEventListener('click', () => { document.getElementById('modal').style.display = 'none'; document.getElementById('pass-input').value = ''; });
        document.getElementById('login-btn').addEventListener('click', () => {
            if (document.getElementById('pass-input').value === "CoRf121") { isAdmin = true; document.getElementById('modal').style.display = 'none'; updateUI(); }
            else document.getElementById('login-error').classList.remove('hidden');
            document.getElementById('pass-input').value = '';
        });

        document.getElementById('pass-input').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('login-btn').click(); });

        window.onload = () => { if (darkMode) document.documentElement.classList.add('dark'); updateUI(); };
    </script>
</body>
</html>
